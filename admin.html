<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>實驗室管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--border:#ddd9ce;--text:#1a1916;--text2:#6b6760;--accent:#2a6b4f;--danger:#c0392b;--warn:#d4a843;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.08);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
  header{background:var(--accent);color:#fff;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  header h1{font-size:16px;font-weight:700;}
  main{max-width:1000px;margin:0 auto;padding:20px 16px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-size:13.5px;font-family:inherit;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#1f5139;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-secondary:hover{background:var(--border);}
  .btn-danger{background:var(--danger);color:#fff;}.btn-warn{background:var(--warn);color:#fff;}
  .btn-sm{padding:5px 11px;font-size:12.5px;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .tabs{display:flex;gap:0;margin-bottom:18px;border-bottom:2px solid var(--border);overflow-x:auto;}
  .tab{padding:8px 14px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;white-space:nowrap;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .panel{display:none;}.panel.active{display:block;}
  .purpose-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .purpose-tab{padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.15s;color:var(--text);}
  .purpose-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .record-list{display:flex;flex-direction:column;gap:10px;}
  .record-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;background:var(--surface);}
  .record-card.overdue{border-color:var(--danger);border-width:2px;}
  .record-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .record-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
  .record-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;font-size:12.5px;margin-top:8px;}
  .record-meta-item{display:flex;flex-direction:column;gap:1px;}
  .record-meta-label{font-size:10px;color:var(--text2);font-weight:500;}
  .record-meta-value{font-weight:600;}
  .item-list{margin-top:10px;background:var(--surface2);border-radius:6px;padding:10px 12px;}
  .item-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .item-row:last-child{border-bottom:none;}
  .item-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:18px;}
  .item-name{font-weight:600;flex:1;}
  .item-room{font-size:11px;color:var(--accent);}
  .item-qty{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;}
  .record-actions{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
  .venue-request-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;background:var(--surface);margin-bottom:10px;}
  .venue-request-card.has-pending{border-color:var(--warn);}
  .period-manage-list{margin-top:10px;}
  .period-manage-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:13px;background:var(--surface2);}
  .period-manage-row.approved{background:#d1fae5;}
  .period-manage-row.rejected{background:#fee2e2;text-decoration:line-through;opacity:0.7;}
  .period-manage-row.pending{background:#fef3c7;}
  .period-status-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .ps-pending{background:#fef3c7;color:#92400e;}
  .ps-approved{background:#d1fae5;color:#065f46;}
  .ps-rejected{background:#fee2e2;color:#991b1b;}
  .damage-form{background:#fff5f5;border:1px solid #fca5a5;border-radius:8px;padding:14px;margin-top:10px;}
  .damage-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .damage-row input{flex:1;min-width:80px;padding:6px 10px;font-size:13px;border:1.5px solid var(--border);border-radius:6px;font-family:inherit;outline:none;}
  .damage-summary{background:#fff;border-radius:6px;padding:10px;margin-top:8px;font-size:13px;}
  .damage-line{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--surface2);}
  .damage-line:last-child{border-bottom:none;font-weight:700;font-size:14px;color:var(--danger);}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .badge-pending{background:#fef3c7;color:#92400e;}.badge-approved{background:#d1fae5;color:#065f46;}
  .badge-rejected{background:#fee2e2;color:#991b1b;}.badge-returned{background:#e0e7ff;color:#3730a3;}
  .badge-overdue{background:#fee2e2;color:#991b1b;}.badge-damaged{background:#fce7f3;color:#9d174d;}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;}
  .stat-num{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;}
  .stat-label{font-size:11px;color:var(--text2);margin-top:3px;}
  .venue-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;}
  .venue-table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;max-height:70vh;}
  .venue-table{width:100%;border-collapse:separate;border-spacing:0;min-width:700px;font-size:12px;}
  .venue-table th{background:var(--accent);color:#fff;padding:7px 5px;text-align:center;font-weight:600;white-space:nowrap;position:sticky;top:0;z-index:3;border:1px solid #1f5139;}
  .venue-table th:first-child{left:0;z-index:5;background:#1f5139;min-width:44px;}
  .venue-table th:nth-child(2){left:44px;z-index:5;background:#1f5139;min-width:42px;}
  .venue-table td{border:1px solid var(--border);padding:3px;vertical-align:top;min-width:90px;background:var(--surface);}
  .venue-table tr.band-shade td{background:#f6f4ee;}
  .venue-table .period-cell{font-weight:700;font-size:12px;text-align:center;white-space:nowrap;vertical-align:middle;position:sticky;left:0;z-index:2;min-width:44px;background:#e9e6dc;}
  .venue-table tr.band-shade .period-cell{background:#e0dccf;}
  .venue-table .lab-cell{font-weight:600;font-size:11px;text-align:center;white-space:nowrap;min-width:42px;position:sticky;left:44px;z-index:2;background:#f2f0e9;}
  .venue-table tr.band-shade .lab-cell{background:#eae7dd;}
  .venue-table .lab-生物{color:#15803d;}.venue-table .lab-化學{color:#b45309;}.venue-table .lab-理化{color:#7c3aed;}.venue-table .lab-物理{color:#1d4ed8;}.venue-table .lab-地科{color:#0e7490;}
  .venue-table .period-group-start td{border-top:2px solid var(--accent);}
  .venue-booking{border-radius:4px;padding:2px 5px;margin-bottom:2px;font-size:11px;line-height:1.3;cursor:pointer;text-align:center;}
  .venue-booking.approved{background:#d1fae5;color:#065f46;}
  .venue-booking.pending{background:#fef3c7;color:#92400e;}
  .venue-booking.fixed{background:#e0e7ff;color:#3730a3;}
  .venue-booking.rejected{background:#fee2e2;color:#991b1b;text-decoration:line-through;}
  .venue-add-admin{width:100%;background:none;border:1px dashed var(--border);border-radius:4px;padding:2px;font-size:10.5px;color:var(--text2);cursor:pointer;margin-top:2px;}
  .venue-add-admin:hover{border-color:var(--accent);color:var(--accent);}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:22px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
  label{font-size:12px;font-weight:500;color:var(--text2);}
  input,select,textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:60px;}
  .form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
  .toast{position:fixed;bottom:24px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:8px;font-size:13.5px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.25s;z-index:400;}
  .toast.show{transform:none;opacity:1;}.toast.success{background:var(--accent);}.toast.error{background:var(--danger);}
  .loading{text-align:center;padding:36px;color:var(--text2);}
  .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:40px 20px;color:var(--text2);}
  .empty-icon{font-size:36px;margin-bottom:8px;}
  .info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px 14px;font-size:13px;color:#1e40af;margin-bottom:14px;}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:360px;box-shadow:var(--shadow);text-align:center;}
  .login-input{width:100%;padding:11px 14px;font-size:15px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px;}
  .login-input:focus{border-color:var(--accent);}
  .login-err{color:var(--danger);font-size:13px;margin-bottom:10px;display:none;}
  @media(max-width:600px){.tab{padding:7px 9px;font-size:12px;}}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div style="font-size:40px;margin-bottom:12px">🔐</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:6px">管理員登入</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:24px">請輸入管理密碼</div>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="login-err" id="pwErr">密碼錯誤，請再試一次</div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="checkPw()">進入管理後台</button>
  </div>
</div>

<div id="adminWrap" style="display:none">
<header>
  <div style="display:flex;align-items:center;gap:12px"><span style="font-size:20px">🧪</span><h1>實驗室管理後台</h1></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-secondary btn-sm" onclick="loadAll()">🔄 重新整理</button>
    <button class="btn btn-secondary btn-sm" onclick="logout()">登出</button>
  </div>
</header>
<main>
<div class="stats-grid" id="statsGrid"></div>
<div class="tabs">

  <button class="tab" onclick="showTab('approved')">✅ 已核准</button>
  <button class="tab" onclick="showTab('return')">📬 確認歸還</button>
  <button class="tab" onclick="showTab('deposit')">💰 保證金</button>
  <button class="tab" onclick="showTab('venue')">🏛️ 場地管理</button>
  <button class="tab" onclick="showTab('semester')">📆 學期設定</button>

<div id="panel-pending" class="panel active">
  <div class="card" style="margin-bottom:0"><div class="card-title">⏳ 待審核器材申請</div>

  <div id="pendingList"><div class="loading"><div class="spinner"></div>載入中…</div></div></div>
</div>
<div id="panel-approved" class="panel">
  <div class="card" style="margin-bottom:0"><div class="card-title">✅ 已核准器材申請</div>
  <div class="purpose-tabs" id="approvedPurposeTabs"></div>
  <div id="approvedList"><div class="empty"><div class="empty-icon">📋</div><p>點重新整理載入</p></div></div></div>
</div>
<div id="panel-return" class="panel">
  <div class="card" style="margin-bottom:0"><div class="card-title">📬 確認器材歸還</div>
  <div id="returnList"><div class="empty"><div class="empty-icon">📋</div><p>點重新整理載入</p></div></div></div>
</div>
<div id="panel-deposit" class="panel">
  <div class="card" style="margin-bottom:0"><div class="card-title">💰 保證金管理</div>
  <div id="depositList"><div class="empty"><div class="empty-icon">💳</div><p>點重新整理載入</p></div></div></div>
</div>

<div id="panel-venue" class="panel">
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">⏳ 待審核場地申請</div>
    <div id="venuePendingList"><div class="loading"><div class="spinner"></div>載入中…</div></div>
  </div>
  <div class="card" style="margin-bottom:0">
    <div class="card-title">🏛️ 場地週曆</div>
    <div class="week-selector" id="adminWeekSelector" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <span style="font-size:13px;color:var(--text2)">快速跳到：</span>
      <select id="adminWeekJump" onchange="adminJumpToWeek(this.value)" style="min-width:110px"></select>
      <span id="adminCurrentWeekBadge" style="display:inline-block;background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px"></span>
    </div>
    <div class="venue-nav">
      <button class="btn btn-secondary btn-sm" onclick="changeAdminWeek(-1)">← 上週</button>
      <span style="font-size:14px;font-weight:700" id="adminVenueWeekLabel"></span>
      <button class="btn btn-secondary btn-sm" onclick="changeAdminWeek(1)">下週 →</button>
      <button class="btn btn-primary btn-sm" onclick="goAdminThisWeek()">本週</button>
    </div>
    <div class="venue-table-wrap"><table class="venue-table" id="adminVenueTable"></table></div>
  </div>
</div>

<div id="panel-semester" class="panel">
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">📆 新增 / 編輯學期</div>
    <div class="info-box">設定開學日與總週數後，系統會自動計算每個日期屬於第幾週。設為「啟用中」的學期會用於前台週次顯示。</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      <div class="form-group"><label>學期名稱 *</label><input type="text" id="sem-name" placeholder="例如：114學年度上學期"></div>
      <div class="form-group"><label>開學日 *</label><input type="date" id="sem-start"></div>
      <div class="form-group"><label>總週數 *</label><input type="number" id="sem-weeks" value="20" min="1" max="30"></div>
      <div class="form-group"><label>寒假開始</label><input type="date" id="sem-winter-start"></div>
      <div class="form-group"><label>寒假結束</label><input type="date" id="sem-winter-end"></div>
      <div class="form-group"><label>暑假開始</label><input type="date" id="sem-summer-start"></div>
      <div class="form-group"><label>暑假結束</label><input type="date" id="sem-summer-end"></div>
      <div class="form-group" style="flex-direction:row;align-items:center;gap:8px;padding-top:20px"><input type="checkbox" id="sem-active" style="width:auto"><label for="sem-active" style="color:var(--text)">設為啟用中學期</label></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" onclick="clearSemesterForm()">清除</button>
      <button class="btn btn-primary" onclick="saveSemester()">💾 儲存學期</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:0">
    <div class="card-title">📋 已建立的學期</div>
    <div id="semesterList"><div class="empty"><div class="empty-icon">📆</div><p>尚未建立任何學期</p></div></div>
  </div>
</div>

<div id="panel-all" class="panel">
  <div class="card" style="margin-bottom:0"><div class="card-title">📊 全部器材借用記錄</div>
  <div class="purpose-tabs" id="allPurposeTabs"></div>
  <div id="allList"><div class="empty"><div class="empty-icon">📋</div><p>點重新整理載入</p></div></div></div>
</div>
</main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal"><div class="modal-title" id="modalTitle"></div><div id="modalBody"></div><div class="modal-actions" id="modalActions"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://bgifddtcklpqbmljlvcg.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaWZkZHRja2xwcWJtbGpsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTU0NzQsImV4cCI6MjA5NjU3MTQ3NH0.fHdIRQU2mD9IwX3XHKize1aewAnc9ZpGF0W7Z0wgx64';
const ADMIN_PW='191313';
const ROOM_NAMES={'Chemistry':'化學實驗室','Biology':'生物實驗室','Geoscience':'地球科學實驗室','Physics Chemistry':'理化實驗室','Physics':'物理實驗室','TeachingMaterialRoom':'教具室'};

function checkPw(){if(document.getElementById('pwInput').value===ADMIN_PW){document.getElementById('loginWrap').style.display='none';document.getElementById('adminWrap').style.display='block';loadAll();}else{document.getElementById('pwErr').style.display='block';document.getElementById('pwInput').value='';}}

// ── 修正：讀 text() 再 parse，避免 204 / 201 空 body 爆炸 ──
async function sb(method,table,opts={}){
  let url=SUPABASE_URL+'/rest/v1/'+table;
  const p=[];
  if(opts.select)p.push('select='+opts.select);
  if(opts.filter)p.push(opts.filter);
  if(opts.order)p.push('order='+opts.order);
  if(p.length)url+='?'+p.join('&');
  const res=await fetch(url,{method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation'},body:opts.body?JSON.stringify(opts.body):undefined});
  const text=await res.text();
  const data=text?JSON.parse(text):null;
  if(!res.ok)throw new Error((data&&data.message)||res.statusText);
  return data||[];
}

let allRecords=[],allEquipment=[],allVenueBookings=[];
let currentPurposeFilter={pending:'全部',approved:'全部',all:'全部'};
let adminWeekOffset=0;

// ── 修正：每個陣列都加 Array.isArray 保護 ──
async function loadAll(){
  try{
    const[rows,equip,venueRows]=await Promise.all([
      sb('GET','borrow_records',{order:'created_at.desc'}),
      sb('GET','equipment',{order:'room,name'}),
      sb('GET','venue_bookings',{order:'created_at.desc'})
    ]);
    allEquipment=Array.isArray(equip)?equip:[];
    allVenueBookings=Array.isArray(venueRows)?venueRows:[];
    allRecords=(Array.isArray(rows)?rows:[]).map(r=>({
      id:r.id,time:r.created_at,name:r.borrower_name,studentId:r.student_id,
      role:r.role,purpose:r.purpose,items:r.items||[],
      borrowDate:r.borrow_date,returnDate:r.return_date,actualReturn:r.actual_return,
      status:r.status,depositType:r.deposit_type,depositAmount:r.deposit_amount,
      depositStatus:r.deposit_status,note:r.note,damageNote:r.damage_note||'',finalRefund:r.final_refund
    }));
    renderStats();
    renderWithFilter('pending');renderWithFilter('approved');renderWithFilter('all');
    renderList(allRecords.filter(r=>r.status==='已核准'||r.status==='逾期'),document.getElementById('returnList'),'return');
    renderList(allRecords.filter(r=>r.depositAmount>0),document.getElementById('depositList'),'deposit');
    renderPurposeTabs('pending');renderPurposeTabs('approved');renderPurposeTabs('all');
    renderVenuePending();loadAdminVenue();
  }catch(e){showToast('載入失敗：'+e.message,'error');}
}

function renderStats(){
  const pending=allRecords.filter(r=>r.status==='待審核').length;
  const approved=allRecords.filter(r=>r.status==='已核准').length;
  const overdue=allRecords.filter(r=>r.status==='逾期').length;
  const venuePending=allVenueBookings.filter(b=>(b.periods||[]).some(p=>p.status==='待審核')).length;
  const depPending=allRecords.filter(r=>r.depositStatus==='待繳納').length;
  const depReturn=allRecords.filter(r=>r.depositStatus==='待退還').length;
  document.getElementById('statsGrid').innerHTML=[
    {num:pending,label:'器材待審核',color:'#92400e'},{num:approved,label:'器材借用中',color:'#065f46'},
    {num:overdue,label:'逾期未還',color:'var(--danger)'},{num:venuePending,label:'場地待審核',color:'#1e40af'},
    {num:depPending,label:'待收保證金',color:'#92400e'},{num:depReturn,label:'待退保證金',color:'#1e40af'},
  ].map(s=>`<div class="stat-card"><div class="stat-num" style="color:${s.color}">${s.num}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function renderPurposeTabs(panel){
  const el=document.getElementById(panel+'PurposeTabs');if(!el)return;
  el.innerHTML=PURPOSES.map(p=>`<button class="purpose-tab ${currentPurposeFilter[panel]===p?'active':''}" onclick="setPurposeFilter('${panel}','${p}')">${p}</button>`).join('');
}
function setPurposeFilter(panel,purpose){currentPurposeFilter[panel]=purpose;renderPurposeTabs(panel);renderWithFilter(panel);}
function renderWithFilter(panel){
  let records=allRecords;
  if(panel==='pending')records=allRecords.filter(r=>r.status==='待審核');
  else if(panel==='approved')records=allRecords.filter(r=>r.status==='已核准'||r.status==='逾期');
  const f=currentPurposeFilter[panel];if(f&&f!=='全部')records=records.filter(r=>r.purpose===f);
  renderList(records,document.getElementById(panel+'List'),panel);
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['pending','approved','return','deposit','venue','semester','all'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='venue')loadAdminVenue();
  if(tab==='semester')loadSemesters();
}

function renderList(records,container,mode){
  if(!records||!records.length){container.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>目前沒有記錄</p></div>';return;}
  container.innerHTML='<div class="record-list">'+records.map(r=>renderRecord(r,mode)).join('')+'</div>';
}

function renderRecord(r,mode){
  const sc={'待審核':'badge-pending','已核准':'badge-approved','已拒絕':'badge-rejected','已歸還':'badge-returned','逾期':'badge-overdue','已歸還-損壞':'badge-damaged'}[r.status]||'badge-pending';
  const items=Array.isArray(r.items)?r.items:[];
  const today=new Date(),returnDate=r.returnDate?new Date(r.returnDate):null;
  const overdueDays=returnDate&&today>returnDate?Math.floor((today-returnDate)/(1000*60*60*24)):0;
  const itemListHtml=items.length?`<div class="item-list"><div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px">借用器材清單</div>${items.map((i,idx)=>`<div class="item-row"><span class="item-num">${idx+1}.</span><span class="item-name">${i.name}</span><span class="item-room">${rn(i.room)}</span><span class="item-qty">× ${i.quantity} ${i.unit||''}</span></div>`).join('')}</div>`:'';
  const damageHtml=r.damageNote?`<div style="background:#fff5f5;border-radius:6px;padding:8px 10px;margin-top:8px;font-size:12.5px;color:var(--danger)">⚠️ ${r.damageNote}${r.finalRefund!=null?' | 退還：NT$'+r.finalRefund:''}</div>`:'';
  let actions='';
  if(mode==='pending'&&r.status==='待審核')actions=`<button class="btn btn-primary btn-sm" onclick="approveRecord('${r.id}')">✅ 核准</button><button class="btn btn-danger btn-sm" onclick="rejectRecord('${r.id}')">❌ 拒絕</button>`;
  if(mode==='return'&&(r.status==='已核准'||r.status==='逾期'))actions=`<button class="btn btn-primary btn-sm" onclick="confirmReturn('${r.id}')">📬 完整歸還</button><button class="btn btn-danger btn-sm" onclick="openDamageModal('${r.id}')">⚠️ 損壞歸還</button>`;
  if(mode==='deposit'&&r.depositAmount>0){
    if(r.depositStatus==='待繳納')actions=`<button class="btn btn-secondary btn-sm" onclick="updateDeposit('${r.id}','已繳納')">💰 標記已繳納</button>`;
    if(r.depositStatus==='待退還')actions=`<button class="btn btn-primary btn-sm" onclick="confirmRefund('${r.id}',${r.depositAmount})">↩️ 確認退還</button>`;
    if(r.depositStatus==='損壞-照價賠償')actions=`<button class="btn btn-warn btn-sm" onclick="openDamageSettleModal('${r.id}',${r.depositAmount})">💸 計算賠償</button>`;
  }
  return `<div class="record-card ${r.status==='逾期'?'overdue':''}">
    <div class="record-header">
      <div><span class="record-id">${r.id}</span>
        <div style="font-size:14px;font-weight:700;margin-top:2px">${r.name} <span style="font-size:12px;font-weight:400;color:var(--accent)">【${r.purpose}】</span></div>
        <div style="font-size:12px;color:var(--text2)">${r.role||'學生'}${r.studentId?' ・ '+r.studentId:''}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="badge ${sc}">${r.status}</span>
        ${overdueDays>0?`<span style="font-size:11px;color:var(--danger);font-weight:600">逾期 ${overdueDays} 天</span>`:''}
      </div>
    </div>
    <div class="record-meta">
      <div class="record-meta-item"><span class="record-meta-label">借用日期</span><span class="record-meta-value">${r.borrowDate||'─'}</span></div>
      <div class="record-meta-item"><span class="record-meta-label">預計歸還</span><span class="record-meta-value">${r.returnDate||'─'}</span></div>
      ${r.actualReturn?`<div class="record-meta-item"><span class="record-meta-label">實際歸還</span><span class="record-meta-value">${r.actualReturn}</span></div>`:''}
      ${r.depositAmount>0?`<div class="record-meta-item"><span class="record-meta-label">保證金</span><span class="record-meta-value">NT$${r.depositAmount} / ${r.depositStatus}</span></div>`:''}
    </div>
    ${itemListHtml}${damageHtml}
    ${r.note?`<div style="font-size:12px;color:var(--text2);margin-top:6px">📝 ${r.note}</div>`:''}
    ${actions?`<div class="record-actions">${actions}</div>`:''}
  </div>`;
}

  const list=document.getElementById('venuePendingList');
  const pendingBookings=allVenueBookings.filter(b=>(b.periods||[]).some(p=>p.status==='待審核'));
  if(!pendingBookings.length){list.innerHTML='<div class="empty"><div class="empty-icon">✅</div><p>目前沒有待審核的場地申請</p></div>';return;}
  list.innerHTML=pendingBookings.map(b=>{
    const periods=b.periods||[];
    const pendingCount=periods.filter(p=>p.status==='待審核').length;
    return `<div class="venue-request-card has-pending">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)">${b.id}</span>

          <div style="font-size:12px;color:var(--text2)">${b.role||'學生'}${b.student_id?' ・ '+b.student_id:''}</div>
        </div>
        <span class="badge badge-pending">待審核 ${pendingCount} 筆</span>
      </div>
      <div class="period-manage-list">
        ${periods.map((p,i)=>`
          <div class="period-manage-row ${p.status==='已核准'?'approved':p.status==='已拒絕'?'rejected':'pending'}">
            <input type="checkbox" id="pck-${b.id}-${i}" ${p.status==='待審核'?'checked':''} ${p.status!=='待審核'?'disabled':''} style="width:auto;flex-shrink:0">
            <span style="flex:1;font-weight:600">${p.date}</span>
            <span style="color:var(--text2)">${p.period}</span>
            <span style="color:var(--accent)">${p.venue}</span>

        <button class="btn btn-danger btn-sm" onclick="approveVenueSelected('${b.id}',false)">❌ 拒絕勾選時段</button>
        <button class="btn btn-secondary btn-sm" onclick="approveAllVenue('${b.id}',true)">✅✅ 全部核准</button>
        <button class="btn btn-danger btn-sm" style="opacity:0.7" onclick="approveAllVenue('${b.id}',false)">❌❌ 全部拒絕</button>
      </div>
      ${b.note?`<div style="font-size:12px;color:var(--text2);margin-top:6px">📝 ${b.note}</div>`:''}
    </div>`;
  }).join('');
}

async function approveVenueSelected(bookingId,approve,force){
  const booking=allVenueBookings.find(b=>b.id===bookingId);if(!booking)return;
  // 找出本次勾選且待審核的時段
  const selected=[];
  (booking.periods||[]).forEach((p,i)=>{
    const cb=document.getElementById(`pck-${bookingId}-${i}`);
    if(cb&&cb.checked&&p.status==='待審核')selected.push(p);
  });
  if(!selected.length){showToast('沒有勾選任何待審核時段','error');return;}
  // 核准時先檢查衝突
  if(approve&&!force){
    const conflicts=selected.filter(p=>venueSlotConflict(p.date,p.period,p.venue,bookingId));
    if(conflicts.length){
      showModal('⚠️ 時段衝突',`<p>以下勾選時段已有核准／固定預約：</p><div style="margin-top:8px;font-size:13px">${conflicts.map(c=>`<div style="padding:3px 0;color:var(--danger)">${c.date} ${c.period} ${c.venue}</div>`).join('')}</div><p style="margin-top:6px;font-size:13px">仍要核准（造成重複預約）嗎？</p>`,[
        {label:'取消',cls:'btn-secondary',fn:'closeModal()'},
        {label:'仍要核准',cls:'btn-warn',fn:`approveVenueSelected('${bookingId}',true,true)`}
      ]);
      return;
    }
  }
  closeModal();
  const periods=(booking.periods||[]).map((p,i)=>{
    const cb=document.getElementById(`pck-${bookingId}-${i}`);
    return (cb&&cb.checked&&p.status==='待審核')?{...p,status:approve?'已核准':'已拒絕'}:p;
  });
  const allDone=periods.every(p=>p.status!=='待審核');
  const overallStatus=allDone?(periods.some(p=>p.status==='已核准')?'已核准':'已拒絕'):'部分核准';
  try{
    await sb('PATCH','venue_bookings',{filter:'id=eq.'+bookingId,body:{periods,status:overallStatus},prefer:'return=minimal'});
    showToast(approve?'已核准選取時段':'已拒絕選取時段','success');loadAll();
  }catch(e){showToast('更新失敗','error');}
}

async function approveAllVenue(bookingId,approve,force){
  const booking=allVenueBookings.find(b=>b.id===bookingId);if(!booking)return;
  if(approve&&!force){
    const pendingPeriods=(booking.periods||[]).filter(p=>p.status==='待審核');
    const conflicts=pendingPeriods.filter(p=>venueSlotConflict(p.date,p.period,p.venue,bookingId));
    if(conflicts.length){
      showModal('⚠️ 時段衝突',`<p>以下時段已有核准／固定預約：</p><div style="margin-top:8px;font-size:13px">${conflicts.map(c=>`<div style="padding:3px 0;color:var(--danger)">${c.date} ${c.period} ${c.venue}</div>`).join('')}</div><p style="margin-top:6px;font-size:13px">仍要全部核准（造成重複預約）嗎？</p>`,[
        {label:'取消',cls:'btn-secondary',fn:'closeModal()'},
        {label:'仍要核准',cls:'btn-warn',fn:`approveAllVenue('${bookingId}',true,true)`}
      ]);
      return;
    }
  }
  closeModal();
  const periods=(booking.periods||[]).map(p=>({...p,status:p.status==='待審核'?(approve?'已核准':'已拒絕'):p.status}));
  const status=approve?'已核准':'已拒絕';
  try{
    await sb('PATCH','venue_bookings',{filter:'id=eq.'+bookingId,body:{periods,status},prefer:'return=minimal'});
    showToast(approve?'全部時段已核准':'全部時段已拒絕','success');loadAll();
  }catch(e){showToast('更新失敗','error');}
}

function getWeekDates(offset){const now=new Date(),day=now.getDay(),monday=new Date(now);monday.setDate(now.getDate()-((day+6)%7)+offset*7);monday.setHours(0,0,0,0);const dates=[];for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);dates.push(d);}return dates;}
function fmtDate(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function fmtDateTW(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function changeAdminWeek(delta){adminWeekOffset+=delta;loadAdminVenue();}
function goAdminThisWeek(){adminWeekOffset=0;loadAdminVenue();}

let activeSemester=null,allSemesters=[];

async function loadActiveSemester(){
  try{
    const rows=await sb('GET','semester_settings',{filter:'is_active=eq.true',order:'created_at.desc'});
    activeSemester=(Array.isArray(rows)&&rows.length)?rows[0]:null;
    buildAdminWeekSelector();
  }catch(e){activeSemester=null;}
}

function getMondayOfOffset(offset){const now=new Date(),day=now.getDay(),monday=new Date(now);monday.setDate(now.getDate()-((day+6)%7)+offset*7);monday.setHours(0,0,0,0);return monday;}

function getWeekNumber(date){
  if(!activeSemester||!activeSemester.start_date)return null;
  const start=new Date(activeSemester.start_date+'T00:00:00');
  const startDay=start.getDay();
  const startMonday=new Date(start);startMonday.setDate(start.getDate()-((startDay+6)%7));startMonday.setHours(0,0,0,0);
  const diffDays=Math.floor((date-startMonday)/(1000*60*60*24));
  return Math.floor(diffDays/7)+1;
}

function buildAdminWeekSelector(){
  const sel=document.getElementById('adminWeekJump'),wrap=document.getElementById('adminWeekSelector');
  if(!activeSemester){wrap.style.display='none';return;}
  wrap.style.display='flex';
  const total=activeSemester.total_weeks||20;
  let opts='';for(let w=1;w<=total;w++)opts+=`<option value="${w}">第 ${w} 週</option>`;
  sel.innerHTML=opts;
}

function adminJumpToWeek(week){
  if(!activeSemester)return;
  week=parseInt(week);
  const start=new Date(activeSemester.start_date+'T00:00:00');
  const startDay=start.getDay();
  const startMonday=new Date(start);startMonday.setDate(start.getDate()-((startDay+6)%7));startMonday.setHours(0,0,0,0);
  const targetMonday=new Date(startMonday);targetMonday.setDate(startMonday.getDate()+(week-1)*7);
  const thisMonday=getMondayOfOffset(0);
  adminWeekOffset=Math.round((targetMonday-thisMonday)/(1000*60*60*24*7));
  loadAdminVenue();
}

async function loadAdminVenue(){
  if(!activeSemester)await loadActiveSemester();
  const dates=getWeekDates(adminWeekOffset);
  const startStr=fmtDate(dates[0]),endStr=fmtDate(dates[6]);
  const weekNum=getWeekNumber(dates[0]);
  const badge=document.getElementById('adminCurrentWeekBadge'),weekSel=document.getElementById('adminWeekJump');
  if(weekNum!==null&&activeSemester&&weekNum>=1&&weekNum<=(activeSemester.total_weeks||20)){
    document.getElementById('adminVenueWeekLabel').textContent=`第${weekNum}週　${fmtDateTW(dates[0])} ～ ${fmtDateTW(dates[6])}`;
    if(badge){badge.textContent=`第 ${weekNum} 週`;badge.style.display='inline-block';}
    if(weekSel)weekSel.value=weekNum;
  }else{
    document.getElementById('adminVenueWeekLabel').textContent=`${fmtDateTW(dates[0])} ～ ${fmtDateTW(dates[6])}`;
    if(badge)badge.style.display='none';
  }
  try{
    const all=await sb('GET','venue_bookings',{order:'created_at'});
    const expanded=[];
    (Array.isArray(all)?all:[]).forEach(b=>{(b.periods||[]).forEach(p=>{if(p.date>=startStr&&p.date<=endStr){expanded.push({...b,displayDate:p.date,displayPeriod:p.period,displayVenue:p.venue,periodStatus:p.status});}});});
    renderAdminVenueTable(dates,expanded);
  }catch(e){}
}

            ${s.summer_break_start?`<div style="font-size:12px;color:var(--text2)">暑假：${s.summer_break_start} ～ ${s.summer_break_end||'?'}</div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${!s.is_active?`<button class="btn btn-primary btn-sm" onclick="activateSemester('${s.id}')">設為啟用</button>`:''}

let editingSemesterId=null;
function clearSemesterForm(){
  editingSemesterId=null;
  ['sem-name','sem-start','sem-winter-start','sem-winter-end','sem-summer-start','sem-summer-end'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('sem-weeks').value='20';
  document.getElementById('sem-active').checked=false;
}

function editSemester(id){
  const s=allSemesters.find(x=>x.id===id);if(!s)return;
  editingSemesterId=id;
  document.getElementById('sem-name').value=s.name||'';
  document.getElementById('sem-start').value=s.start_date||'';
  document.getElementById('sem-weeks').value=s.total_weeks||20;
  document.getElementById('sem-winter-start').value=s.winter_break_start||'';
  document.getElementById('sem-winter-end').value=s.winter_break_end||'';
  document.getElementById('sem-summer-start').value=s.summer_break_start||'';
  document.getElementById('sem-summer-end').value=s.summer_break_end||'';
  document.getElementById('sem-active').checked=!!s.is_active;
  document.querySelector('#panel-semester .card-title').scrollIntoView({behavior:'smooth'});
  showToast('已載入學期資料，可修改後儲存','success');
}

async function saveSemester(){
  const name=document.getElementById('sem-name').value.trim();
  const start=document.getElementById('sem-start').value;
  const weeks=parseInt(document.getElementById('sem-weeks').value)||20;
  if(!name||!start){showToast('請填寫學期名稱和開學日','error');return;}
  const isActive=document.getElementById('sem-active').checked;
  const body={
    name,start_date:start,total_weeks:weeks,
    winter_break_start:document.getElementById('sem-winter-start').value||null,
    winter_break_end:document.getElementById('sem-winter-end').value||null,
    summer_break_start:document.getElementById('sem-summer-start').value||null,
    summer_break_end:document.getElementById('sem-summer-end').value||null,
    is_active:isActive
  };
  try{
    if(isActive){
      const actives=await sb('GET','semester_settings',{filter:'is_active=eq.true'});
      for(const a of(Array.isArray(actives)?actives:[])){if(a.id!==editingSemesterId)await sb('PATCH','semester_settings',{filter:'id=eq.'+a.id,body:{is_active:false},prefer:'return=minimal'});}
    }
    if(editingSemesterId){
      await sb('PATCH','semester_settings',{filter:'id=eq.'+editingSemesterId,body,prefer:'return=minimal'});
      showToast('學期已更新','success');
    }else{
      body.id='SEM-'+Date.now();
      await sb('POST','semester_settings',{body,prefer:'return=minimal'});
      showToast('學期已建立','success');
    }
    clearSemesterForm();loadSemesters();loadActiveSemester();
  }catch(e){showToast('儲存失敗：'+e.message,'error');}
}

async function activateSemester(id){
  try{
    const actives=await sb('GET','semester_settings',{filter:'is_active=eq.true'});
    for(const a of(Array.isArray(actives)?actives:[]))await sb('PATCH','semester_settings',{filter:'id=eq.'+a.id,body:{is_active:false},prefer:'return=minimal'});
    await sb('PATCH','semester_settings',{filter:'id=eq.'+id,body:{is_active:true},prefer:'return=minimal'});
    showToast('已設為啟用中學期','success');loadSemesters();loadActiveSemester();

}

function venueLabel(b){
  const purposeShort={'自主學習':'自主','科展':'科展','探究':'探究','課程':'課程','社團':'社團'}[b.purpose]||b.purpose||'';
  const who=(b.role==='學生'&&b.student_id)?b.student_id:b.borrower_name;
  return `${purposeShort}-${who}`;
}

function renderAdminVenueTable(dates,expanded){
  const table=document.getElementById('adminVenueTable');
  const LABS=['生物','化學','理化','物理','地科'];
  const labFull={'生物':'生物實驗室','化學':'化學實驗室','理化':'理化實驗室','物理':'物理實驗室','地科':'地科實驗室'};
  let html=`<thead><tr><th>節次</th><th>實驗室</th>${dates.map((d,i)=>`<th>週${DAYS[i]}<br><span style="font-size:10px;font-weight:400">${fmtDateTW(d)}</span></th>`).join('')}</tr></thead><tbody>`;
  PERIODS.forEach((period,pi)=>{
    const shade=pi%2===1;
    LABS.forEach((lab,li)=>{
      html+=`<tr class="${li===0?'period-group-start':''} ${shade?'band-shade':''}">`;
      if(li===0)html+=`<td rowspan="5" class="period-cell">${period}</td>`;
      html+=`<td class="lab-cell lab-${lab}">${lab}</td>`;
      dates.forEach(date=>{
        const dateStr=fmtDate(date);
        const venueFull=labFull[lab];
        const cellBookings=expanded.filter(b=>b.displayDate===dateStr&&b.displayPeriod===period&&b.displayVenue===venueFull);
        html+=`<td class="vcell">`;
        cellBookings.forEach(b=>{
          const cls=b.is_fixed?'fixed':b.periodStatus==='已核准'?'approved':b.periodStatus==='已拒絕'?'rejected':'pending';
          html+=`<div class="venue-booking ${cls}" onclick="clickAdminBooking('${b.id}','${dateStr}','${period}','${venueFull}')">${b.is_fixed?'📌':''}${venueLabel(b)}</div>`;
        });
        html+=`<button class="venue-add-admin" onclick="openAdminAddVenue('${dateStr}','${period}','${venueFull}')">＋</button>`;
        html+=`</td>`;
      });
      html+=`</tr>`;
    });
  });
  html+=`</tbody>`;table.innerHTML=html;
}

function clickAdminBooking(bookingId,date,period,venue){
  const booking=allVenueBookings.find(b=>b.id===bookingId);
  if(!booking){showToast('找不到資料','error');return;}
  const periods=booking.periods||[];
  const target=periods.find(p=>p.date===date&&p.period===period&&p.venue===venue);
  showModal(`場地預約 — ${date} ${period}`,`
    <div style="font-size:14px;margin-bottom:6px"><strong>${booking.borrower_name}</strong> 【${booking.purpose}】</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:4px">${booking.role||''}${booking.student_id?' ・ '+booking.student_id:''}</div>
    <div style="font-size:13px;margin-bottom:10px">${venue}　${period}　狀態：<strong>${target?.status||booking.status}</strong></div>
    ${booking.note?`<div style="font-size:13px;color:var(--text2)">📝 ${booking.note}</div>`:''}
    <div style="font-size:12px;color:var(--text2);margin-top:8px">此預約單共 ${periods.length} 個時段，刪除僅移除此時段。</div>
  `,[
    {label:'關閉',cls:'btn-secondary',fn:'closeModal()'},
    ...((target?.status||booking.status)==='待審核'?[
      {label:'✅ 核准此時段',cls:'btn-primary',fn:`setPeriodStatus('${bookingId}','${date}','${period}','${venue}','已核准')`},
      {label:'❌ 拒絕此時段',cls:'btn-danger',fn:`setPeriodStatus('${bookingId}','${date}','${period}','${venue}','已拒絕')`}
    ]:[]),
    {label:'🗑️ 刪除此時段',cls:'btn-danger',fn:`deletePeriod('${bookingId}','${date}','${period}','${venue}')`}
  ]);
}

// 衝突 = 同 date+period+venue 已有「固定課程」或「已核准」的其他預約
function venueSlotConflict(date,period,venue,excludeId){
  return allVenueBookings.find(b=>b.id!==excludeId&&(b.periods||[]).some(p=>p.date===date&&p.period===period&&p.venue===venue&&(b.is_fixed||p.status==='已核准')));
}

async function setPeriodStatus(bookingId,date,period,venue,status,force){
  if(status==='已核准'&&!force){
    const conf=venueSlotConflict(date,period,venue,bookingId);
    if(conf){
      showModal('⚠️ 時段衝突',`<p>此時段已有 <strong>${conf.borrower_name}</strong> 的核准／固定預約。</p><p style="margin-top:6px;font-size:13px;color:var(--text2)">${date} ${period} ${venue}</p><p style="margin-top:6px;font-size:13px">仍要核准（造成重複預約）嗎？</p>`,[
        {label:'取消',cls:'btn-secondary',fn:'closeModal()'},
        {label:'仍要核准',cls:'btn-warn',fn:`setPeriodStatus('${bookingId}','${date}','${period}','${venue}','已核准',true)`}
      ]);
      return;
    }
  }
  const booking=allVenueBookings.find(b=>b.id===bookingId);if(!booking)return;
  const periods=(booking.periods||[]).map(p=>(p.date===date&&p.period===period&&p.venue===venue)?{...p,status}:p);
  const allDone=periods.every(p=>p.status!=='待審核');
  const overall=allDone?(periods.some(p=>p.status==='已核准')?'已核准':'已拒絕'):'部分核准';
  closeModal();
  try{await sb('PATCH','venue_bookings',{filter:'id=eq.'+bookingId,body:{periods,status:overall},prefer:'return=minimal'});showToast('已更新','success');loadAll();}
  catch(e){showToast('失敗','error');}
}

async function deletePeriod(bookingId,date,period,venue){
  const booking=allVenueBookings.find(b=>b.id===bookingId);if(!booking)return;
  const periods=(booking.periods||[]).filter(p=>!(p.date===date&&p.period===period&&p.venue===venue));
  closeModal();
  try{
    if(periods.length===0){
      await sb('DELETE','venue_bookings',{filter:'id=eq.'+bookingId,prefer:'return=minimal'});
    }else{
      await sb('PATCH','venue_bookings',{filter:'id=eq.'+bookingId,body:{periods},prefer:'return=minimal'});
    }
    showToast('時段已刪除','success');loadAll();
  }catch(e){showToast('刪除失敗','error');}
}

// ── 器材審核 ──────────────────────────────────────────────
function approveRecord(id){showModal('確認核准',`<p>確定核准 <strong>${id}</strong> 嗎？</p>`,[{label:'取消',cls:'btn-secondary',fn:'closeModal()'},{label:'確認核准',cls:'btn-primary',fn:`doApprove('${id}')`}]);}
function rejectRecord(id){showModal('確認拒絕',`<p>確定拒絕 <strong>${id}</strong> 嗎？</p><div class="form-group" style="margin-top:10px"><label>拒絕原因</label><textarea id="rejectNote" rows="2" style="margin-top:4px"></textarea></div>`,[{label:'取消',cls:'btn-secondary',fn:'closeModal()'},{label:'確認拒絕',cls:'btn-danger',fn:`doReject('${id}')`}]);}

// 核准：核准當下重新計算各器材已借出量，夠才核准（庫存採推導模型，不寫 available）
async function doApprove(id){
  closeModal();
  const rec=allRecords.find(r=>r.id===id);
  if(!rec){showToast('找不到記錄','error');return;}
  try{
    const approved=await sb('GET','borrow_records',{filter:'status=in.(已核准,逾期)'});
    const borrowedMap={};
    (Array.isArray(approved)?approved:[]).forEach(r=>{(r.items||[]).forEach(it=>{const k=it.room+'__'+it.name;borrowedMap[k]=(borrowedMap[k]||0)+(parseInt(it.quantity)||0);});});
    const shortage=[];
    (rec.items||[]).forEach(it=>{
      const eq=allEquipment.find(e=>e.room===it.room&&e.name===it.name);
      const total=eq?parseInt(eq.total)||0:0;
      const already=borrowedMap[it.room+'__'+it.name]||0;
      if(already+(parseInt(it.quantity)||0)>total)shortage.push(`${it.name}（需 ${it.quantity}，可借 ${Math.max(0,total-already)}）`);
    });
    if(shortage.length){showToast('庫存不足，無法核准：'+shortage.join('、'),'error');return;}
    await sb('PATCH','borrow_records',{filter:'id=eq.'+id,body:{status:'已核准'},prefer:'return=minimal'});
    showToast('已核准','success');loadAll();
  }catch(e){showToast('核准失敗：'+e.message,'error');}
}

// 拒絕：只改狀態，不需加回庫存（可借量是推導的）
async function doReject(id){
  closeModal();
  try{
    const note=document.getElementById('rejectNote')?.value||'';
    const body={status:'已拒絕'};if(note)body.note=note;
    await sb('PATCH','borrow_records',{filter:'id=eq.'+id,body,prefer:'return=minimal'});
    showToast('已拒絕','success');loadAll();
  }catch(e){showToast('更新失敗','error');}
}
function confirmReturn(id){showModal('確認完整歸還',`<p>確認器材完整歸還？</p>`,[{label:'取消',cls:'btn-secondary',fn:'closeModal()'},{label:'確認歸還',cls:'btn-primary',fn:`doReturn('${id}',false,'',0)`}]);}
function openDamageModal(id){
  const record=allRecords.find(r=>r.id===id);const items=record?.items||[];
  showModal('⚠️ 損壞歸還',`
    <div class="form-group"><label>損壞說明 *</label><textarea id="damageNoteInput" rows="2" placeholder="說明損壞情況"></textarea></div>
    <div class="damage-form">
      <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:10px">💸 賠償計算</div>
      ${items.map((item,i)=>`<div class="damage-row"><span style="font-size:12.5px;min-width:90px">${item.name}×${item.quantity}</span><input type="number" id="dmg_qty_${i}" placeholder="損壞數" min="0" max="${item.quantity}" oninput="calcDamage(${record?.depositAmount||0})"><span style="font-size:12px">件×NT$</span><input type="number" id="dmg_price_${i}" placeholder="單價" oninput="calcDamage(${record?.depositAmount||0})"></div>`).join('')}
      <div class="damage-summary">
        <div class="damage-line"><span>保證金</span><span>NT$${record?.depositAmount||0}</span></div>
        <div class="damage-line"><span>賠償金額</span><span id="dmgTotal">NT$0</span></div>
        <div class="damage-line"><span>實際退還</span><span id="dmgRefund">NT$${record?.depositAmount||0}</span></div>
      </div>
    </div>
  `,[{label:'取消',cls:'btn-secondary',fn:'closeModal()'},{label:'確認損壞歸還',cls:'btn-danger',fn:`doReturn('${id}',true,document.getElementById('damageNoteInput').value,${record?.depositAmount||0})`}]);
  window._dmgItems=items;window._dmgDeposit=record?.depositAmount||0;
}
function calcDamage(deposit){const items=window._dmgItems||[];let total=0;items.forEach((item,i)=>{const q=parseInt(document.getElementById('dmg_qty_'+i)?.value)||0,p=parseInt(document.getElementById('dmg_price_'+i)?.value)||0;total+=q*p;});const refund=Math.max(0,deposit-total);if(document.getElementById('dmgTotal'))document.getElementById('dmgTotal').textContent='NT$'+total;if(document.getElementById('dmgRefund'))document.getElementById('dmgRefund').textContent='NT$'+refund;}
async function doReturn(id,damaged,damageNote,depositAmount){
  closeModal();
  try{
    const today=new Date().toISOString().split('T')[0];
    const items=window._dmgItems||[];let comp=0;const lost={};
    if(damaged)items.forEach((item,i)=>{
      const q=parseInt(document.getElementById('dmg_qty_'+i)?.value)||0;
      const p=parseInt(document.getElementById('dmg_price_'+i)?.value)||0;
      comp+=q*p; if(q>0)lost[item.room+'__'+item.name]=(lost[item.room+'__'+item.name]||0)+q;
    });
    const finalRefund=damaged?Math.max(0,(depositAmount||0)-comp):depositAmount;
    const body={status:damaged?'已歸還-損壞':'已歸還',actual_return:today,deposit_status:damaged?'損壞-照價賠償':'待退還'};
    if(damaged){body.damage_note=damageNote;body.final_refund=finalRefund;}
    await sb('PATCH','borrow_records',{filter:'id=eq.'+id,body,prefer:'return=minimal'});
    // 推導模型：正常歸還不必加回 available（改狀態後自動回補）；損壞品視為報廢，從 total 扣除
    if(damaged)for(const k in lost){const eq=allEquipment.find(e=>e.room+'__'+e.name===k);if(eq)await sb('PATCH','equipment',{filter:'id=eq.'+eq.id,body:{total:Math.max(0,(parseInt(eq.total)||0)-lost[k])},prefer:'return=minimal'});}
    showToast(damaged?`損壞歸還，應退還 NT$${finalRefund}`:'歸還確認成功','success');loadAll();
  }catch(e){showToast('更新失敗','error');}
}
async function updateDeposit(id,status){try{await sb('PATCH','borrow_records',{filter:'id=eq.'+id,body:{deposit_status:status},prefer:'return=minimal'});showToast('已更新','success');loadAll();}catch(e){showToast('失敗','error');}}
function confirmRefund(id,amount){showModal('確認退還',`<p>確認退還 NT$<strong>${amount}</strong>？</p>`,[{label:'取消',cls:'btn-secondary',fn:'closeModal()'},{label:'確認已退還',cls:'btn-primary',fn:`updateDeposit('${id}','已退還')`}]);}
function openDamageSettleModal(id,depositAmount){showModal('💸 損壞賠償結算',`<div class="form-group"><label>損壞說明</label><textarea id="settleNote" rows="2">${allRecords.find(r=>r.id===id)?.damageNote||''}</textarea></div><div class="form-group"><label>賠償金額(NT$)</label><input type="number" id="settleComp" placeholder="0" oninput="calcSettle(${depositAmount})"></div><div class="damage-summary"><div class="damage-line"><span>保證金</span><span>NT$${depositAmount}</span></div><div class="damage-line"><span>賠償</span><span id="settleCompDisplay">NT$0</span></div><div class="damage-line"><span>退還</span><span id="settleRefund">NT$${depositAmount}</span></div></div>`,[{label:'取消',cls:'btn-secondary',fn:'closeModal()'},{label:'確認結算',cls:'btn-warn',fn:`doSettle('${id}',${depositAmount})`}]);}
function calcSettle(deposit){const comp=parseInt(document.getElementById('settleComp')?.value)||0,refund=Math.max(0,deposit-comp);if(document.getElementById('settleCompDisplay'))document.getElementById('settleCompDisplay').textContent='NT$'+comp;if(document.getElementById('settleRefund'))document.getElementById('settleRefund').textContent='NT$'+refund;}
async function doSettle(id,depositAmount){const comp=parseInt(document.getElementById('settleComp')?.value)||0,note=document.getElementById('settleNote')?.value||'',refund=Math.max(0,depositAmount-comp);closeModal();try{await sb('PATCH','borrow_records',{filter:'id=eq.'+id,body:{deposit_status:'損壞結算完成',damage_note:note,final_refund:refund},prefer:'return=minimal'});showToast(`結算完成，退還 NT$${refund}`,'success');loadAll();}catch(e){showToast('失敗','error');}}

function showModal(title,body,actions){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalActions').innerHTML=actions.map(a=>`<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');document.getElementById('modalOverlay').classList.add('show');}
function closeModal(event){if(!event||event.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');}
let toastTimer;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),4000);}
</script>
