<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>實驗室管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--border:#ddd9ce;--text:#1a1916;--text2:#6b6760;--accent:#2a6b4f;--danger:#c0392b;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.08); }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
  header{background:var(--accent);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  header h1{font-size:17px;font-weight:700;}
  main{max-width:960px;margin:0 auto;padding:28px 20px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:18px;box-shadow:var(--shadow);}
  .card-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:7px;border:none;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-primary{background:var(--accent);color:#fff;} .btn-primary:hover{background:#1f5139;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);} .btn-secondary:hover{background:var(--border);}
  .btn-danger{background:var(--danger);color:#fff;} .btn-danger:hover{background:#a93226;}
  .btn-sm{padding:5px 12px;font-size:13px;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .admin-tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:2px solid var(--border);}
  .admin-tab{padding:8px 18px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;}
  .admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .admin-panel{display:none;} .admin-panel.active{display:block;}
  .record-list{display:flex;flex-direction:column;gap:12px;}
  .record-card{border:1px solid var(--border);border-radius:8px;padding:14px 16px;background:var(--surface);}
  .record-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .record-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);}
  .record-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;font-size:13px;margin-top:8px;}
  .record-meta-item{display:flex;flex-direction:column;gap:2px;}
  .record-meta-label{font-size:11px;color:var(--text2);font-weight:500;}
  .record-meta-value{font-weight:600;}
  .record-items{margin-top:8px;font-size:13px;color:var(--text2);}
  .record-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
  .badge-pending{background:#fef3c7;color:#92400e;} .badge-approved{background:#d1fae5;color:#065f46;}
  .badge-rejected{background:#fee2e2;color:#991b1b;} .badge-returned{background:#e0e7ff;color:#3730a3;}
  .badge-overdue{background:#fee2e2;color:#991b1b;} .badge-damaged{background:#fce7f3;color:#9d174d;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:24px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 18px;border-radius:8px;font-size:14px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.25s;z-index:300;}
  .toast.show{transform:none;opacity:1;} .toast.success{background:var(--accent);} .toast.error{background:var(--danger);}
  .loading{text-align:center;padding:40px;color:var(--text2);font-size:14px;}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty{text-align:center;padding:50px 20px;color:var(--text2);}
  .empty-icon{font-size:40px;margin-bottom:10px;}
  label{font-size:13px;font-weight:500;color:var(--text2);}
  input,select,textarea{border:1.5px solid var(--border);border-radius:7px;padding:9px 12px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;width:100%;}
  input:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical;min-height:70px;}
  /* 登入畫面 */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px 32px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center;}
  .login-icon{font-size:40px;margin-bottom:12px;}
  .login-title{font-size:20px;font-weight:700;margin-bottom:6px;}
  .login-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
  .login-input{width:100%;padding:11px 14px;font-size:15px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;outline:none;text-align:center;letter-spacing:4px;margin-bottom:14px;}
  .login-input:focus{border-color:var(--accent);}
  .login-err{color:var(--danger);font-size:13px;margin-bottom:10px;display:none;}
</style>
</head>
<body>

<!-- 登入畫面 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-icon">🔐</div>
    <div class="login-title">管理員登入</div>
    <div class="login-sub">請輸入管理密碼進入後台</div>
    <input class="login-input" type="password" id="pwInput" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="login-err" id="pwErr">密碼錯誤，請再試一次</div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="checkPw()">進入管理後台</button>
  </div>
</div>

<!-- 管理後台（登入後顯示） -->
<div id="adminWrap" style="display:none">
<header>
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:22px">🧪</span>
    <h1>實驗室管理後台</h1>
  </div>
  <button class="btn btn-secondary btn-sm" onclick="logout()">登出</button>
</header>
<main>
  <div class="admin-tabs">
    <button class="admin-tab active" onclick="showTab('pending')">⏳ 待審核</button>
    <button class="admin-tab" onclick="showTab('approved')">✅ 已核准</button>
    <button class="admin-tab" onclick="showTab('return')">📬 確認歸還</button>
    <button class="admin-tab" onclick="showTab('deposit')">💰 保證金</button>
    <button class="admin-tab" onclick="showTab('all')">📊 全部記錄</button>
  </div>

  <div id="tab-pending" class="admin-panel active">
    <div class="card" style="margin-bottom:0"><div class="card-title">⏳ 待審核申請</div>
    <button class="btn btn-secondary btn-sm" onclick="loadRecords()" style="margin-bottom:12px">🔄 重新整理</button>
    <div id="pendingList"><div class="loading"><div class="spinner"></div>載入中…</div></div></div>
  </div>
  <div id="tab-approved" class="admin-panel">
    <div class="card" style="margin-bottom:0"><div class="card-title">✅ 已核准申請</div>
    <button class="btn btn-secondary btn-sm" onclick="loadRecords()" style="margin-bottom:12px">🔄 重新整理</button>
    <div id="approvedList"><div class="empty"><div class="empty-icon">📋</div><p>點重新整理載入</p></div></div></div>
  </div>
  <div id="tab-return" class="admin-panel">
    <div class="card" style="margin-bottom:0"><div class="card-title">📬 確認歸還</div>
    <button class="btn btn-secondary btn-sm" onclick="loadRecords()" style="margin-bottom:12px">🔄 重新整理</button>
    <div id="returnList"><div class="empty"><div class="empty-icon">📋</div><p>點重新整理載入</p></div></div></div>
  </div>
  <div id="tab-deposit" class="admin-panel">
    <div class="card" style="margin-bottom:0"><div class="card-title">💰 保證金管理</div>
    <button class="btn btn-secondary btn-sm" onclick="loadRecords()" style="margin-bottom:12px">🔄 重新整理</button>
    <div id="depositList"><div class="empty"><div class="empty-icon">💳</div><p>點重新整理載入</p></div></div></div>
  </div>
  <div id="tab-all" class="admin-panel">
    <div class="card" style="margin-bottom:0"><div class="card-title">📊 全部借用記錄</div>
    <button class="btn btn-secondary btn-sm" onclick="loadRecords()" style="margin-bottom:12px">🔄 重新整理</button>
    <div id="allList"><div class="empty"><div class="empty-icon">📋</div><p>點重新整理載入</p></div></div></div>
  </div>
</main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bgifddtcklpqbmljlvcg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaWZkZHRja2xwcWJtbGpsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTU0NzQsImV4cCI6MjA5NjU3MTQ3NH0.fHdIRQU2mD9IwX3XHKize1aewAnc9ZpGF0W7Z0wgx64';
const ADMIN_PW = '191313'; // ← 你可以自行修改這個密碼

const ROOM_NAMES = {'Chemistry':'化學實驗室','Biology':'生物實驗室','Geoscience':'地球科學實驗室','Physics Chemistry':'理化實驗室','Physics':'物理實驗室','TeachingMaterialRoom':'教具室'};
const rn = r => ROOM_NAMES[r] || r;

// 登入
function checkPw() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PW) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadRecords();
  } else {
    document.getElementById('pwErr').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
}
function logout() {
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

async function sb(method, table, opts = {}) {
  let url = SUPABASE_URL + '/rest/v1/' + table;
  const params = [];
  if (opts.select) params.push('select=' + opts.select);
  if (opts.filter) params.push(opts.filter);
  if (opts.order) params.push('order=' + opts.order);
  if (params.length) url += '?' + params.join('&');
  const res = await fetch(url, {
    method,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': opts.prefer || 'return=representation' },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (res.status === 204) return [];
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || res.statusText);
  return data;
}

let allEquipment = [];
async function loadRecords() {
  try {
    const [rows, equip] = await Promise.all([
      sb('GET', 'borrow_records', { order: 'created_at.desc' }),
      sb('GET', 'equipment', { order: 'room,name' })
    ]);
    allEquipment = equip;
    const records = mapRecords(rows);
    renderList(records.filter(r => r.status === '待審核'), 'pendingList', 'pending');
    renderList(records.filter(r => r.status === '已核准' || r.status === '逾期'), 'approvedList', 'approved');
    renderList(records.filter(r => r.status === '已核准' || r.status === '逾期'), 'returnList', 'return');
    renderList(records.filter(r => r.depositAmount > 0), 'depositList', 'deposit');
    renderList(records, 'allList', 'all');
  } catch(e) { showToast('載入失敗：' + e.message, 'error'); }
}

function mapRecords(rows) {
  return rows.map(r => ({ id: r.id, time: r.created_at, name: r.borrower_name, email: r.email, purpose: r.purpose, items: r.items||[], borrowDate: r.borrow_date, returnDate: r.return_date, actualReturn: r.actual_return, status: r.status, depositType: r.deposit_type, depositAmount: r.deposit_amount, depositStatus: r.deposit_status, note: r.note }));
}

function showTab(tab) {
  document.querySelectorAll('.admin-tab').forEach((t,i) => t.classList.toggle('active', ['pending','approved','return','deposit','all'][i] === tab));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function renderList(records, containerId, mode) {
  const c = document.getElementById(containerId);
  if (!records || !records.length) { c.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>目前沒有記錄</p></div>'; return; }
  c.innerHTML = '<div class="record-list">' + records.map(r => renderRecord(r, mode)).join('') + '</div>';
}

function renderRecord(r, mode) {
  const sc = {'待審核':'badge-pending','已核准':'badge-approved','已拒絕':'badge-rejected','已歸還':'badge-returned','逾期':'badge-overdue','已歸還-損壞':'badge-damaged'}[r.status] || 'badge-pending';
  const items = Array.isArray(r.items) ? r.items : [];
  const itemStr = items.map(i => rn(i.room) + ' ' + i.name + ' × ' + i.quantity + (i.unit||'')).join('、') || '─';
  let actions = '';
  if (mode === 'pending' && r.status === '待審核')
    actions = `<button class="btn btn-primary btn-sm" onclick="approveRecord('${r.id}')">✅ 核准</button>
               <button class="btn btn-danger btn-sm" onclick="rejectRecord('${r.id}')">❌ 拒絕</button>`;
  if (mode === 'return' && (r.status === '已核准' || r.status === '逾期'))
    actions = `<button class="btn btn-primary btn-sm" onclick="confirmReturn('${r.id}',false)">📬 確認歸還（完整）</button>
               <button class="btn btn-danger btn-sm" onclick="confirmReturn('${r.id}',true)">⚠️ 確認歸還（損壞）</button>`;
  if (mode === 'deposit' && r.depositAmount > 0) {
    if (r.depositStatus === '待繳納') actions = `<button class="btn btn-secondary btn-sm" onclick="updateDeposit('${r.id}','已繳納')">💰 標記已繳納</button>`;
    if (r.depositStatus === '待退還') actions = `<button class="btn btn-primary btn-sm" onclick="updateDeposit('${r.id}','已退還')">↩️ 標記已退還</button>`;
  }
  return `<div class="record-card">
    <div class="record-header">
      <div><span class="record-id">${r.id}</span>
        <div style="font-size:14px;font-weight:700;margin-top:3px">${r.name}</div>
        <div style="font-size:13px;color:var(--text2)">${r.email}</div></div>
      <span class="badge ${sc}">${r.status}</span>
    </div>
    <div class="record-meta">
      <div class="record-meta-item"><span class="record-meta-label">借用目的</span><span class="record-meta-value">${r.purpose}</span></div>
      <div class="record-meta-item"><span class="record-meta-label">借用日期</span><span class="record-meta-value">${r.borrowDate||'─'}</span></div>
      <div class="record-meta-item"><span class="record-meta-label">預計歸還</span><span class="record-meta-value">${r.returnDate||'─'}</span></div>
      ${r.depositAmount>0?`<div class="record-meta-item"><span class="record-meta-label">保證金</span><span class="record-meta-value">NT$${r.depositAmount} (${r.depositStatus})</span></div>`:''}
    </div>
    <div class="record-items">🔬 ${itemStr}</div>
    ${r.note?`<div style="font-size:12px;color:var(--text2);margin-top:4px">📝 ${r.note}</div>`:''}
    ${actions?`<div class="record-actions">${actions}</div>`:''}
  </div>`;
}

function approveRecord(id) {
  showModal('確認核准', `<p>確定核准申請單 <strong>${id}</strong> 嗎？</p>`, [
    {label:'取消',cls:'btn-secondary',fn:'closeModal()'},
    {label:'確認核准',cls:'btn-primary',fn:`doStatus('${id}','已核准')`}
  ]);
}
function rejectRecord(id) {
  showModal('確認拒絕', `<p>確定拒絕申請單 <strong>${id}</strong> 嗎？</p>
    <div style="margin-top:12px"><label>拒絕原因（選填）</label>
    <textarea id="rejectNote" rows="2" style="margin-top:6px"></textarea></div>`, [
    {label:'取消',cls:'btn-secondary',fn:'closeModal()'},
    {label:'確認拒絕',cls:'btn-danger',fn:`doStatus('${id}','已拒絕',document.getElementById('rejectNote').value)`}
  ]);
}
async function doStatus(id, status, note) {
  closeModal();
  try {
    const body = { status };
    if (note) body.note = note;
    await sb('PATCH', 'borrow_records', { filter: 'id=eq.' + id, body, prefer: 'return=minimal' });
    if (status === '已拒絕') {
      const rows = await sb('GET', 'borrow_records', { filter: 'id=eq.' + id });
      if (rows.length > 0) {
        for (const item of (rows[0].items || [])) {
          const equip = allEquipment.find(e => e.room === item.room && e.name === item.name);
          if (equip) await sb('PATCH', 'equipment', { filter: 'id=eq.' + equip.id, body: { available: equip.available + parseInt(item.quantity) }, prefer: 'return=minimal' });
        }
      }
    }
    showToast('狀態已更新', 'success'); loadRecords();
  } catch(e) { showToast('更新失敗：' + e.message, 'error'); }
}
function confirmReturn(id, damaged) {
  const label = damaged ? '損壞歸還' : '完整歸還';
  showModal('確認歸還', `<p>確認 <strong>${id}</strong> ${label}？</p>
    ${damaged?'<p style="color:var(--danger);font-size:13px;margin-top:6px">⚠️ 損壞將保留保證金並照價賠償</p>':''}`, [
    {label:'取消',cls:'btn-secondary',fn:'closeModal()'},
    {label:'確認'+label,cls:damaged?'btn-danger':'btn-primary',fn:`doReturn('${id}',${damaged})`}
  ]);
}
async function doReturn(id, damaged) {
  closeModal();
  try {
    const today = new Date().toISOString().split('T')[0];
    await sb('PATCH', 'borrow_records', { filter: 'id=eq.' + id, body: { status: damaged?'已歸還-損壞':'已歸還', actual_return: today, deposit_status: damaged?'損壞-照價賠償':'待退還' }, prefer: 'return=minimal' });
    if (!damaged) {
      const rows = await sb('GET', 'borrow_records', { filter: 'id=eq.' + id });
      if (rows.length > 0) {
        for (const item of (rows[0].items || [])) {
          const equip = allEquipment.find(e => e.room === item.room && e.name === item.name);
          if (equip) await sb('PATCH', 'equipment', { filter: 'id=eq.' + equip.id, body: { available: equip.available + parseInt(item.quantity) }, prefer: 'return=minimal' });
        }
      }
    }
    showToast('歸還已確認', 'success'); loadRecords();
  } catch(e) { showToast('更新失敗：' + e.message, 'error'); }
}
async function updateDeposit(id, status) {
  try {
    await sb('PATCH', 'borrow_records', { filter: 'id=eq.' + id, body: { deposit_status: status }, prefer: 'return=minimal' });
    showToast('保證金狀態已更新', 'success'); loadRecords();
  } catch(e) { showToast('更新失敗：' + e.message, 'error'); }
}

function showModal(title, body, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalActions').innerHTML = actions.map(a => `<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(event) {
  if (!event || event.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('show');
}
let toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
