<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>實驗室器材借用系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f3ef; --surface: #ffffff; --surface2: #f0efe9;
    --border: #ddd9ce; --text: #1a1916; --text2: #6b6760;
    --accent: #2a6b4f; --accent2: #d4a843; --danger: #c0392b;
    --radius: 10px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; }
  header { background: var(--accent); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 700; }
  header nav { display: flex; gap: 4px; }
  header nav button { background: none; border: none; color: rgba(255,255,255,0.8); padding: 6px 13px; border-radius: 6px; cursor: pointer; font-size: 13.5px; font-family: inherit; font-weight: 500; transition: all 0.15s; }
  header nav button:hover, header nav button.active { background: rgba(255,255,255,0.18); color: #fff; }
  main { max-width: 960px; margin: 0 auto; padding: 28px 20px; }
  .page { display: none; animation: fadeIn 0.2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .card-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 500; color: var(--text2); }
  input, select, textarea { border: 1.5px solid var(--border); border-radius: 7px; padding: 9px 12px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); transition: border-color 0.15s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,107,79,0.12); }
  textarea { resize: vertical; min-height: 70px; }
  .hint { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 7px; border: none; font-size: 14px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1f5139; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(42,107,79,0.3); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
  .deposit-banner { background: linear-gradient(135deg,#fffbeb,#fef3c7); border: 1.5px solid var(--accent2); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 18px; display: none; }
  .deposit-banner.show { display: block; }
  .deposit-banner h3 { font-size: 14px; color: #92400e; margin-bottom: 8px; }
  .deposit-banner ul { list-style: none; font-size: 13.5px; color: #78350f; }
  .deposit-banner li { padding: 3px 0; }
  .deposit-amount { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--accent); margin: 10px 0 4px; }
  /* 搜尋 */
  .global-search-wrap { position: relative; margin-bottom: 14px; }
  .global-search-input { width: 100%; padding: 11px 16px 11px 42px; font-size: 14px; border: 1.5px solid var(--border); border-radius: 8px; background: var(--bg); font-family: inherit; outline: none; transition: border-color 0.15s; }
  .global-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(42,107,79,0.12); }
  .global-search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 17px; pointer-events: none; }
  .search-results { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 8px; }
  .search-result-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--surface2); cursor: pointer; transition: background 0.1s; }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: var(--surface2); }
  .search-result-img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
  .search-result-img-placeholder { width: 48px; height: 48px; border-radius: 6px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .search-result-name { font-size: 14px; font-weight: 700; }
  .search-result-room { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 2px; }
  .search-result-spec { font-size: 12px; color: var(--text2); }
  .search-result-avail { font-size: 13px; font-weight: 600; white-space: nowrap; margin-left: auto; }
  .search-empty { padding: 20px; text-align: center; color: var(--text2); font-size: 14px; }
  /* 房間分頁 */
  .room-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .room-tab { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--surface2); font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; color: var(--text); }
  .room-tab.active, .room-tab:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  /* 器材卡片 */
  .equip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
  .equip-item { border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.15s; background: var(--surface); }
  .equip-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(42,107,79,0.12); }
  .equip-item.selected { border-color: var(--accent); background: #f0f9f4; }
  .equip-item.unavailable { opacity: 0.45; cursor: not-allowed; }
  .equip-item-img { width: 100%; height: 110px; object-fit: cover; background: var(--surface2); display: block; }
  .equip-item-img-placeholder { width: 100%; height: 110px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 30px; }
  .equip-item-body { padding: 9px 11px; }
  .equip-name { font-size: 13px; font-weight: 600; }
  .equip-spec { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .equip-avail { font-size: 12px; margin-top: 5px; }
  .avail-ok { color: var(--accent); }
  .avail-no { color: var(--danger); }
  .equip-qty { display: flex; align-items: center; gap: 5px; margin-top: 7px; }
  .qty-btn { width: 24px; height: 24px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .qty-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .qty-input { width: 40px; text-align: center; padding: 3px 4px; border: 1px solid var(--border); border-radius: 5px; font-size: 12px; }
  .selected-list { margin-top: 14px; }
  .selected-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border-radius: 6px; margin-bottom: 6px; font-size: 13.5px; }
  .remove-item { color: var(--danger); cursor: pointer; font-size: 16px; padding: 0 4px; background: none; border: none; }
  /* 器材瀏覽 */
  .equip-browse-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .equip-browse-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); transition: box-shadow 0.15s; }
  .equip-browse-card:hover { box-shadow: var(--shadow); }
  .equip-browse-img { width: 100%; height: 130px; object-fit: cover; background: var(--surface2); display: block; }
  .equip-browse-img-placeholder { width: 100%; height: 130px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .equip-browse-body { padding: 12px 14px; }
  .equip-browse-room { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .equip-browse-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .equip-browse-spec { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .equip-browse-count { display: flex; align-items: center; gap: 6px; }
  .count-bar-bg { height: 5px; background: var(--border); border-radius: 3px; flex: 1; }
  .count-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
  .count-num { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; white-space: nowrap; }
  /* 記錄 */
  .record-list { display: flex; flex-direction: column; gap: 12px; }
  .record-card { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; background: var(--surface); }
  .record-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
  .record-id { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); }
  .record-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; font-size: 13px; margin-top: 8px; }
  .record-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .record-meta-label { font-size: 11px; color: var(--text2); font-weight: 500; }
  .record-meta-value { font-weight: 600; }
  .record-items { margin-top: 8px; font-size: 13px; color: var(--text2); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-approved { background: #d1fae5; color: #065f46; }
  .badge-rejected { background: #fee2e2; color: #991b1b; }
  .badge-returned { background: #e0e7ff; color: #3730a3; }
  .badge-overdue { background: #fee2e2; color: #991b1b; }
  .badge-damaged { background: #fce7f3; color: #9d174d; }
  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; max-width: 480px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.25s; z-index: 300; }
  .toast.show { transform: none; opacity: 1; }
  .toast.success { background: var(--accent); }
  .toast.error { background: var(--danger); }
  .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 50px 20px; color: var(--text2); }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-bar input { flex: 1; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } header nav button { padding: 6px 8px; font-size: 12px; } }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <span style="font-size:22px">🧪</span>
    <h1>實驗室器材借用系統</h1>
  </div>
  <nav>
    <button class="active" onclick="showPage('borrow')">申請借用</button>
    <button onclick="showPage('equipment')">器材查詢</button>
    <button onclick="showPage('myrecords')">我的記錄</button>
  </nav>
</header>
<main>

<!-- 申請借用 -->
<div id="page-borrow" class="page active">
  <div class="deposit-banner" id="depositBanner">
    <h3>⚠️ 此借用目的需繳納保證金</h3>
    <ul>
      <li>🏛️ 僅借用場地：NT$500</li>
      <li>🔬 僅借用器材：NT$1,000</li>
      <li>📦 場地＋器材皆借：NT$1,500</li>
      <li>✅ 完整歸還後全額退還；如有損壞，照價賠償</li>
    </ul>
    <div class="deposit-amount" id="depositCalc">NT$ 0</div>
    <div style="font-size:13px;color:#92400e">預估保證金（請於借用前至辦公室繳納）</div>
  </div>
  <div class="card">
    <div class="card-title">👤 借用人資料</div>
    <div class="form-grid">
      <div class="form-group"><label>借用人姓名 *</label><input type="text" id="f-name" placeholder="輸入姓名"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="f-email" placeholder="student@school.edu.tw"></div>
      <div class="form-group">
        <label>借用目的 *</label>
        <select id="f-purpose" onchange="onPurposeChange()">
          <option value="">-- 請選擇 --</option>
          <option value="課程">課程</option>
          <option value="自主學習">自主學習</option>
          <option value="科展">科展</option>
          <option value="社團">社團</option>
          <option value="其他">其他</option>
        </select>
        <div class="hint">自主學習、科展需繳保證金</div>
      </div>
      <div class="form-group">
        <label>是否借用場地</label>
        <select id="f-venue" onchange="calcDeposit()">
          <option value="">否（不借用場地）</option>
          <option value="化學實驗室">是（化學實驗室）</option>
          <option value="理化實驗室">是（理化實驗室）</option>
          <option value="物理實驗室">是（物理實驗室）</option>
          <option value="生物實驗室">是（生物實驗室）</option>
          <option value="地科實驗室">是（地科實驗室）</option>
        </select>
      </div>
      <div class="form-group"><label>借用日期 *</label><input type="date" id="f-borrow-date"></div>
      <div class="form-group"><label>預計歸還日期 *</label><input type="date" id="f-return-date"></div>
      <div class="form-group full"><label>備註說明</label><textarea id="f-note" placeholder="其他說明、特殊需求…"></textarea></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🔬 選擇借用器材</div>
    <!-- 搜尋在器材區上方 -->
    <div class="global-search-wrap">
      <span class="global-search-icon">🔎</span>
      <input class="global-search-input" type="text" id="globalSearch"
        placeholder="搜尋器材名稱，例如：燒杯、顯微鏡…"
        oninput="doGlobalSearch(this.value)">
    </div>
    <div id="globalSearchResults"></div>
    <div class="room-tabs" id="roomTabs"><div class="loading"><div class="spinner"></div>載入中…</div></div>
    <div class="equip-grid" id="equipGrid"></div>
    <div class="selected-list" id="selectedList"></div>
  </div>
  <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:4px;">
    <button class="btn btn-secondary" onclick="resetForm()">清除重填</button>
    <button class="btn btn-primary" id="submitBtn" onclick="submitRequest()">📋 提交借用申請</button>
  </div>
</div>

<!-- 器材查詢 -->
<div id="page-equipment" class="page">
  <div class="card">
    <div class="card-title">📦 器材庫存查詢</div>
    <div class="search-bar">
      <input type="text" id="equipSearch" placeholder="搜尋器材名稱…" oninput="filterEquipBrowse()">
      <select id="equipRoomFilter" onchange="filterEquipBrowse()"><option value="">全部房間</option></select>
    </div>
    <div class="equip-browse-grid" id="equipBrowseGrid"><div class="loading"><div class="spinner"></div>載入中…</div></div>
  </div>
</div>

<!-- 我的記錄 -->
<div id="page-myrecords" class="page">
  <div class="card">
    <div class="card-title">📋 我的借用記錄</div>
    <div class="form-grid" style="margin-bottom:16px;">
      <div class="form-group"><label>輸入 Email 查詢</label><input type="email" id="queryEmail" placeholder="your@email.com"></div>
      <div class="form-group" style="justify-content:flex-end;padding-top:20px;"><button class="btn btn-primary" onclick="loadMyRecords()">🔍 查詢</button></div>
    </div>
    <div id="myRecordsList"><div class="empty"><div class="empty-icon">📭</div><p>輸入 Email 後點擊查詢</p></div></div>
  </div>
</div>

</main>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://bgifddtcklpqbmljlvcg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaWZkZHRja2xwcWJtbGpsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTU0NzQsImV4cCI6MjA5NjU3MTQ3NH0.fHdIRQU2mD9IwX3XHKize1aewAnc9ZpGF0W7Z0wgx64';

// 房間名稱中文對照
const ROOM_NAMES = {
  'Chemistry': '化學實驗室',
  'Biology': '生物實驗室',
  'Geoscience': '地球科學實驗室',
  'Physics Chemistry': '理化實驗室',
  'Physics': '物理實驗室',
  'TeachingMaterialRoom': '教具室'
};
const rn = r => ROOM_NAMES[r] || r;

async function sb(method, table, opts = {}) {
  let url = SUPABASE_URL + '/rest/v1/' + table;
  const params = [];
  if (opts.select) params.push('select=' + opts.select);
  if (opts.filter) params.push(opts.filter);
  if (opts.order) params.push('order=' + opts.order);
  if (params.length) url += '?' + params.join('&');
  const res = await fetch(url, {
    method,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': opts.prefer || 'return=representation' },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (res.status === 204) return [];
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || res.statusText);
  return data;
}

let allEquipment = [], selectedItems = {}, allRooms = [], currentRoom = '';

window.addEventListener('DOMContentLoaded', () => {
  setMinDates(); loadEquipment(); loadEquipBrowse();
});

function setMinDates() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-borrow-date').min = today;
  document.getElementById('f-return-date').min = today;
  document.getElementById('f-borrow-date').value = today;
  document.getElementById('f-borrow-date').addEventListener('change', e => {
    document.getElementById('f-return-date').min = e.target.value;
  });
}

// 全域搜尋
let searchTimer = null;
function doGlobalSearch(q) {
  const box = document.getElementById('globalSearchResults');
  clearTimeout(searchTimer);
  if (!q.trim()) { box.innerHTML = ''; return; }
  searchTimer = setTimeout(async () => {
    box.innerHTML = '<div class="loading"><div class="spinner"></div>搜尋中…</div>';
    try {
      const rows = await sb('GET', 'equipment', { filter: 'name=ilike.*' + encodeURIComponent(q) + '*', order: 'room,name' });
      if (!rows.length) { box.innerHTML = '<div class="search-empty">找不到「' + q + '」相關器材</div>'; return; }
      box.innerHTML = '<div class="search-results">' + rows.map(e => {
        const avail = parseInt(e.available) || 0;
        const imgHtml = e.image_url
          ? `<img class="search-result-img" src="${e.image_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="search-result-img-placeholder" style="display:none">🔬</div>`
          : `<div class="search-result-img-placeholder">🔬</div>`;
        return `<div class="search-result-item" onclick="jumpToEquip('${e.room}','${e.name.replace(/'/g,"\\'")}')">
          ${imgHtml}
          <div style="flex:1">
            <div class="search-result-name">${e.name}</div>
            <div class="search-result-room">${rn(e.room)}</div>
            ${e.spec?`<div class="search-result-spec">${e.spec}</div>`:''}
          </div>
          <div class="search-result-avail ${avail>0?'avail-ok':'avail-no'}">${avail>0?'可借 '+avail+' '+e.unit:'無庫存'}</div>
        </div>`;
      }).join('') + '</div>';
    } catch(err) { box.innerHTML = '<div class="search-empty">搜尋失敗</div>'; }
  }, 350);
}

function jumpToEquip(room, name) {
  document.getElementById('globalSearch').value = '';
  document.getElementById('globalSearchResults').innerHTML = '';
  currentRoom = room; renderRoomTabs(); renderEquipGrid();
  setTimeout(() => {
    const key = room + '__' + name;
    if (!selectedItems[key]) {
      const equip = allEquipment.find(e => e.room === room && e.name === name);
      if (equip && parseInt(equip.available) > 0) {
        selectedItems[key] = { room, name, spec: equip.spec, unit: equip.unit, quantity: 1 };
        renderEquipGrid(); renderSelectedList(); calcDeposit();
      }
    }
  }, 200);
}

async function loadEquipment() {
  try {
    const rows = await sb('GET', 'equipment', { order: 'room,name' });
    allEquipment = rows.map(r => ({ id: r.id, room: r.room, name: r.name, spec: r.spec||'', total: r.total, available: r.available, unit: r.unit||'個', image_url: r.image_url||'' }));
    allRooms = [...new Set(rows.map(r => r.room))];
    renderRoomTabs();
    if (allRooms.length > 0) { currentRoom = allRooms[0]; renderEquipGrid(); }
  } catch(e) { document.getElementById('roomTabs').innerHTML = '<p style="color:var(--danger)">載入失敗</p>'; }
}

function renderRoomTabs() {
  document.getElementById('roomTabs').innerHTML = allRooms.map(r =>
    `<button class="room-tab ${r===currentRoom?'active':''}" onclick="selectRoom('${r}')">${rn(r)}</button>`
  ).join('');
}

function selectRoom(room) { currentRoom = room; renderRoomTabs(); renderEquipGrid(); }

function renderEquipGrid() {
  const grid = document.getElementById('equipGrid');
  const items = allEquipment.filter(e => e.room === currentRoom);
  if (!items.length) { grid.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><p>此房間目前無器材</p></div>'; return; }
  grid.innerHTML = items.map(e => {
    const avail = parseInt(e.available)||0;
    const qty = selectedItems[e.room+'__'+e.name]?.quantity||0;
    const imgHtml = e.image_url
      ? `<img class="equip-item-img" src="${e.image_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="equip-item-img-placeholder" style="display:none">🔬</div>`
      : `<div class="equip-item-img-placeholder">🔬</div>`;
    const safeSpec = (e.spec||'').replace(/'/g,"\\'");
    return `<div class="equip-item ${qty>0?'selected':''} ${avail<=0?'unavailable':''}"
      onclick="toggleEquip(event,'${e.room}','${e.name.replace(/'/g,"\\'")}','${safeSpec}','${e.unit}',${avail})">
      ${imgHtml}
      <div class="equip-item-body">
        <div class="equip-name">${e.name}</div>
        ${e.spec?`<div class="equip-spec">${e.spec}</div>`:''}
        <div class="equip-avail ${avail>0?'avail-ok':'avail-no'}">${avail>0?'可借：'+avail+' '+e.unit:'目前無庫存'}</div>
        ${avail>0?`<div class="equip-qty" onclick="event.stopPropagation()">
          <button class="qty-btn" onclick="changeQty('${e.room}','${e.name.replace(/'/g,"\\'")}','${safeSpec}','${e.unit}',${avail},-1)">−</button>
          <input class="qty-input" type="number" min="0" max="${avail}" value="${qty}"
            onchange="setQty('${e.room}','${e.name.replace(/'/g,"\\'")}','${safeSpec}','${e.unit}',${avail},this.value)"
            onclick="event.stopPropagation()">
          <button class="qty-btn" onclick="changeQty('${e.room}','${e.name.replace(/'/g,"\\'")}','${safeSpec}','${e.unit}',${avail},1)">+</button>
        </div>`:''}
      </div>
    </div>`;
  }).join('');
}

function toggleEquip(e, room, name, spec, unit, avail) {
  if (avail<=0) return;
  const key = room+'__'+name;
  if (selectedItems[key]) delete selectedItems[key];
  else selectedItems[key] = {room,name,spec,unit,quantity:1};
  renderEquipGrid(); renderSelectedList(); calcDeposit();
}
function changeQty(room,name,spec,unit,avail,delta) {
  const key=room+'__'+name, cur=selectedItems[key]?.quantity||0, next=Math.max(0,Math.min(avail,cur+delta));
  if(next===0) delete selectedItems[key]; else selectedItems[key]={room,name,spec,unit,quantity:next};
  renderEquipGrid(); renderSelectedList(); calcDeposit();
}
function setQty(room,name,spec,unit,avail,val) {
  const qty=Math.max(0,Math.min(avail,parseInt(val)||0)), key=room+'__'+name;
  if(qty===0) delete selectedItems[key]; else selectedItems[key]={room,name,spec,unit,quantity:qty};
  renderEquipGrid(); renderSelectedList(); calcDeposit();
}
function renderSelectedList() {
  const list=document.getElementById('selectedList'), items=Object.values(selectedItems);
  if(!items.length){list.innerHTML='';return;}
  list.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--text2);margin-bottom:8px;">已選器材：</div>'+
    items.map(i=>`<div class="selected-item">
      <div><span style="font-weight:600">${i.name}</span>
      <span style="color:var(--text2);font-size:12px"> ${i.spec||''} × ${i.quantity} ${i.unit}</span>
      <div style="font-size:11px;color:var(--text2)">${rn(i.room)}</div></div>
      <button class="remove-item" onclick="removeItem('${i.room}__${i.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`).join('');
}
function removeItem(key){delete selectedItems[key];renderEquipGrid();renderSelectedList();calcDeposit();}

function onPurposeChange() {
  const p=document.getElementById('f-purpose').value;
  document.getElementById('depositBanner').classList.toggle('show',p!==''&&p!=='課程');
  calcDeposit();
}
function calcDeposit() {
  const p=document.getElementById('f-purpose').value, hasVenue=!!document.getElementById('f-venue').value, hasEquip=Object.keys(selectedItems).length>0;
  let amount=0;
  if(p!==''&&p!=='課程'){if(hasVenue&&hasEquip)amount=1500;else if(hasVenue)amount=500;else if(hasEquip)amount=1000;}
  document.getElementById('depositCalc').textContent='NT$ '+amount.toLocaleString();
}

async function submitRequest() {
  const name=document.getElementById('f-name').value.trim(), email=document.getElementById('f-email').value.trim(),
    purpose=document.getElementById('f-purpose').value, borrowDate=document.getElementById('f-borrow-date').value,
    returnDate=document.getElementById('f-return-date').value, venue=document.getElementById('f-venue').value,
    note=document.getElementById('f-note').value.trim(), items=Object.values(selectedItems);
  if(!name||!email||!purpose||!borrowDate||!returnDate){showToast('請填寫所有必填欄位','error');return;}
  if(!email.includes('@')){showToast('請輸入正確的 Email','error');return;}
  if(returnDate<borrowDate){showToast('歸還日期不能早於借用日期','error');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='提交中…';
  try {
    const id='REQ-'+Date.now();
    let depositType='無',depositAmount=0;
    if(purpose!=='課程'){
      const hv=!!venue,he=items.length>0;
      if(hv&&he){depositType='場地+器材';depositAmount=1500;}
      else if(hv){depositType='場地';depositAmount=500;}
      else if(he){depositType='器材';depositAmount=1000;}
    }
    await sb('POST','borrow_records',{body:{id,borrower_name:name,email,purpose,items,borrow_date:borrowDate,return_date:returnDate,status:'待審核',deposit_type:depositType,deposit_amount:depositAmount,deposit_status:depositAmount>0?'待繳納':'不需要',note}});
    for(const item of items){
      const equip=allEquipment.find(e=>e.room===item.room&&e.name===item.name);
      if(equip){await sb('PATCH','equipment',{filter:'id=eq.'+equip.id,body:{available:Math.max(0,equip.available-parseInt(item.quantity))},prefer:'return=minimal'});equip.available=Math.max(0,equip.available-parseInt(item.quantity));}
    }
    showModal('✅ 申請成功',`<p>申請編號：<strong style="font-family:'DM Mono',monospace">${id}</strong></p><p style="margin-top:8px;font-size:13.5px;color:var(--text2)">請等待管理員審核。${depositAmount>0?'<br>保證金：NT$'+depositAmount+'（'+depositType+'），請至辦公室繳納。':''}</p>`,[{label:'確定',cls:'btn-primary',fn:'closeModal()'}]);
    resetForm();
  } catch(e){showToast('提交失敗：'+e.message,'error');}
  btn.disabled=false;btn.textContent='📋 提交借用申請';
}

function resetForm(){
  ['f-name','f-email','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-purpose').value='';document.getElementById('f-venue').value='';
  document.getElementById('depositBanner').classList.remove('show');
  selectedItems={};renderEquipGrid();renderSelectedList();setMinDates();
}

async function loadMyRecords(){
  const email=document.getElementById('queryEmail').value.trim();
  if(!email){showToast('請輸入 Email','error');return;}
  const list=document.getElementById('myRecordsList');
  list.innerHTML='<div class="loading"><div class="spinner"></div>查詢中…</div>';
  try{
    const rows=await sb('GET','borrow_records',{filter:'email=eq.'+encodeURIComponent(email),order:'created_at.desc'});
    renderRecordList(mapRecords(rows),list,false);
  }catch(e){list.innerHTML='<div class="empty"><div class="empty-icon">❌</div><p>查詢失敗</p></div>';}
}

let allEquipBrowse=[];
async function loadEquipBrowse(){
  try{
    const rows=await sb('GET','equipment',{order:'room,name'});
    allEquipBrowse=rows.map(r=>({room:r.room,name:r.name,spec:r.spec||'',total:r.total,available:r.available,unit:r.unit||'個',image_url:r.image_url||''}));
    const rf=document.getElementById('equipRoomFilter');
    [...new Set(rows.map(r=>r.room))].forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=rn(r);rf.appendChild(o);});
    renderEquipBrowse(allEquipBrowse);
  }catch(e){}
}
function filterEquipBrowse(){
  const q=document.getElementById('equipSearch').value.toLowerCase(), room=document.getElementById('equipRoomFilter').value;
  renderEquipBrowse(allEquipBrowse.filter(e=>(!room||e.room===room)&&(!q||e.name.toLowerCase().includes(q)||e.spec.toLowerCase().includes(q))));
}
function renderEquipBrowse(items){
  const grid=document.getElementById('equipBrowseGrid');
  if(!items.length){grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>找不到符合的器材</p></div>';return;}
  grid.innerHTML=items.map(e=>{
    const avail=parseInt(e.available)||0,total=parseInt(e.total)||1,pct=Math.round(avail/total*100);
    const imgHtml=e.image_url?`<img class="equip-browse-img" src="${e.image_url}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="equip-browse-img-placeholder" style="display:none">🔬</div>`:`<div class="equip-browse-img-placeholder">🔬</div>`;
    return `<div class="equip-browse-card">${imgHtml}<div class="equip-browse-body">
      <div class="equip-browse-room">${rn(e.room)}</div>
      <div class="equip-browse-name">${e.name}</div>
      <div class="equip-browse-spec">${e.spec||'─'}</div>
      <div class="equip-browse-count"><span class="count-num ${avail>0?'avail-ok':'avail-no'}">${avail}</span>
      <div class="count-bar-bg"><div class="count-bar-fill" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:var(--text2)">/ ${total} ${e.unit}</span></div>
    </div></div>`;
  }).join('');
}

function mapRecords(rows){
  return rows.map(r=>({id:r.id,time:r.created_at,name:r.borrower_name,email:r.email,purpose:r.purpose,items:r.items||[],borrowDate:r.borrow_date,returnDate:r.return_date,actualReturn:r.actual_return,status:r.status,depositType:r.deposit_type,depositAmount:r.deposit_amount,depositStatus:r.deposit_status,note:r.note}));
}
function renderRecordList(records,container,isAdmin,mode){
  if(!records||!records.length){container.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>目前沒有記錄</p></div>';return;}
  container.innerHTML='<div class="record-list">'+records.map(r=>renderRecord(r,isAdmin,mode)).join('')+'</div>';
}
function renderRecord(r,isAdmin,mode){
  const sc={'待審核':'badge-pending','已核准':'badge-approved','已拒絕':'badge-rejected','已歸還':'badge-returned','逾期':'badge-overdue','已歸還-損壞':'badge-damaged'}[r.status]||'badge-pending';
  const items=Array.isArray(r.items)?r.items:[];
  const itemStr=items.map(i=>rn(i.room)+' '+i.name+' × '+i.quantity+(i.unit||'')).join('、')||'─';
  return `<div class="record-card">
    <div class="record-header">
      <div><span class="record-id">${r.id}</span>
        <div style="font-size:14px;font-weight:700;margin-top:3px">${r.name}</div>
        <div style="font-size:13px;color:var(--text2)">${r.email}</div></div>
      <span class="badge ${sc}">${r.status}</span>
    </div>
    <div class="record-meta">
      <div class="record-meta-item"><span class="record-meta-label">借用目的</span><span class="record-meta-value">${r.purpose}</span></div>
      <div class="record-meta-item"><span class="record-meta-label">借用日期</span><span class="record-meta-value">${r.borrowDate||'─'}</span></div>
      <div class="record-meta-item"><span class="record-meta-label">預計歸還</span><span class="record-meta-value">${r.returnDate||'─'}</span></div>
      ${r.depositAmount>0?`<div class="record-meta-item"><span class="record-meta-label">保證金</span><span class="record-meta-value">NT$${r.depositAmount} (${r.depositStatus})</span></div>`:''}
    </div>
    <div class="record-items">🔬 ${itemStr}</div>
    ${r.note?`<div style="font-size:12px;color:var(--text2);margin-top:4px">📝 ${r.note}</div>`:''}
  </div>`;
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('header nav button').forEach((b,i)=>b.classList.toggle('active',['borrow','equipment','myrecords'][i]===page));
}
function showModal(title,body,actions){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalActions').innerHTML=actions.map(a=>`<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(event){if(!event||event.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');}
let toastTimer;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
</body>
