<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>實驗室器材借用系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f3ef;--surface:#fff;--surface2:#f0efe9;--border:#ddd9ce;
    --text:#1a1916;--text2:#6b6760;--accent:#2a6b4f;--accent2:#d4a843;--danger:#c0392b;
    --radius:10px;--shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
  header{background:var(--accent);color:#fff;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.15);}
  .header-left{display:flex;align-items:center;gap:10px;}
  header h1{font-size:16px;font-weight:700;}
  header nav{display:flex;gap:2px;}
  header nav button{background:none;border:none;color:rgba(255,255,255,0.8);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;transition:all 0.15s;}
  header nav button:hover,header nav button.active{background:rgba(255,255,255,0.18);color:#fff;}
  main{max-width:960px;margin:0 auto;padding:20px 16px;}
  .page{display:none;animation:fadeIn 0.2s ease;}
  .page.active{display:block;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:12px;font-weight:500;color:var(--text2);}
  input,select,textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);transition:border-color 0.15s;outline:none;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,107,79,0.12);}
  textarea{resize:vertical;min-height:60px;}
  .hint{font-size:11px;color:var(--text2);margin-top:2px;}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;border:none;font-size:13.5px;font-family:inherit;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{background:#1f5139;transform:translateY(-1px);box-shadow:0 4px 12px rgba(42,107,79,0.3);}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}
  .btn-danger{background:var(--danger);color:#fff;}
  .btn-sm{padding:5px 11px;font-size:12.5px;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none!important;}

  /* 保證金 */
  .deposit-banner{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1.5px solid var(--accent2);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;display:none;}
  .deposit-banner.show{display:block;}
  .deposit-banner h3{font-size:13px;color:#92400e;margin-bottom:6px;}
  .deposit-banner ul{list-style:none;font-size:13px;color:#78350f;}
  .deposit-banner li{padding:2px 0;}
  .deposit-amount{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--accent);margin:8px 0 3px;}

  /* 房間分頁 - 手機友善 */
  .room-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .room-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);font-size:12.5px;cursor:pointer;font-family:inherit;font-weight:500;transition:all 0.15s;color:var(--text);white-space:nowrap;}
  .room-tab.active,.room-tab:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* 搜尋 */
  .search-wrap{position:relative;margin-bottom:12px;}
  .search-input{width:100%;padding:9px 14px 9px 38px;font-size:14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);font-family:inherit;outline:none;transition:border-color 0.15s;}
  .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,107,79,0.12);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
  .search-dropdown{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-top:6px;overflow:hidden;box-shadow:var(--shadow);}
  .search-result-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--surface2);cursor:pointer;transition:background 0.1s;}
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover{background:var(--surface2);}
  .sr-thumb{width:42px;height:42px;border-radius:5px;object-fit:cover;background:var(--surface2);flex-shrink:0;cursor:pointer;}
  .sr-thumb-ph{width:42px;height:42px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .sr-name{font-size:14px;font-weight:700;}
  .sr-room{font-size:11px;color:var(--accent);font-weight:600;margin-top:1px;}
  .sr-spec{font-size:11px;color:var(--text2);}
  .sr-avail{font-size:12.5px;font-weight:600;white-space:nowrap;margin-left:auto;}
  .search-empty{padding:18px;text-align:center;color:var(--text2);font-size:13px;}

  /* 條列式器材列表 */
  .equip-list{display:flex;flex-direction:column;gap:0;}
  .equip-row{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--surface2);transition:background 0.1s;}
  .equip-row:last-child{border-bottom:none;}
  .equip-row:hover{background:var(--surface2);border-radius:6px;}
  .equip-row.unavailable{opacity:0.4;}
  .equip-thumb{width:46px;height:46px;border-radius:6px;object-fit:cover;background:var(--surface2);flex-shrink:0;cursor:pointer;transition:transform 0.15s;}
  .equip-thumb:hover{transform:scale(1.05);}
  .equip-thumb-ph{width:46px;height:46px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .equip-row-info{flex:1;min-width:0;}
  .equip-row-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .equip-row-sub{font-size:11px;color:var(--text2);margin-top:1px;}
  .equip-row-avail{font-size:11.5px;margin-top:2px;}
  .equip-row-qty{display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .qty-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.1s;}
  .qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
  .qty-input{width:38px;text-align:center;padding:2px 4px;border:1px solid var(--border);border-radius:5px;font-size:12.5px;}

  /* 購物車 */
  .cart-fab{position:fixed;bottom:24px;right:20px;z-index:150;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(42,107,79,0.4);display:none;align-items:center;gap:8px;transition:all 0.2s;}
  .cart-fab.show{display:flex;}
  .cart-fab:hover{background:#1f5139;transform:translateY(-2px);}
  .cart-badge{background:#fff;color:var(--accent);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;}
  .cart-drawer{position:fixed;bottom:0;left:0;right:0;z-index:160;background:var(--surface);border-top:2px solid var(--accent);border-radius:16px 16px 0 0;padding:0;max-height:75vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s ease;box-shadow:0 -8px 32px rgba(0,0,0,0.15);}
  .cart-drawer.open{transform:none;}
  .cart-drawer-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
  .cart-drawer-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);}
  .cart-drawer-title{font-size:15px;font-weight:700;}
  .cart-drawer-body{overflow-y:auto;padding:12px 20px;flex:1;}
  .cart-drawer-footer{padding:14px 20px;border-top:1px solid var(--border);}
  .cart-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface2);}
  .cart-item:last-child{border-bottom:none;}
  .cart-item-thumb{width:40px;height:40px;border-radius:5px;object-fit:cover;background:var(--surface2);flex-shrink:0;}
  .cart-item-thumb-ph{width:40px;height:40px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .cart-item-name{font-size:13.5px;font-weight:600;flex:1;}
  .cart-item-sub{font-size:11px;color:var(--text2);}
  .cart-item-qty{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;white-space:nowrap;}
  .cart-item-remove{color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px;background:none;border:none;flex-shrink:0;}
  .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:155;display:none;}
  .cart-overlay.show{display:block;}

  /* 器材查詢頁 */
  .browse-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .browse-filters input{flex:1;min-width:150px;}
  .browse-filters select{min-width:120px;}
  .equip-browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
  .equip-browse-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--surface);transition:box-shadow 0.15s;cursor:pointer;}
  .equip-browse-card:hover{box-shadow:var(--shadow);}
  .equip-browse-img{width:100%;height:120px;object-fit:cover;background:var(--surface2);display:block;transition:transform 0.2s;}
  .equip-browse-card:hover .equip-browse-img{transform:scale(1.03);}
  .equip-browse-img-ph{width:100%;height:120px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:34px;}
  .equip-browse-body{padding:10px 12px;}
  .equip-browse-room{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:2px;}
  .equip-browse-name{font-size:13.5px;font-weight:700;margin-bottom:1px;}
  .equip-browse-spec{font-size:11.5px;color:var(--text2);margin-bottom:7px;}
  .equip-browse-count{display:flex;align-items:center;gap:5px;}
  .count-bar-bg{height:4px;background:var(--border);border-radius:2px;flex:1;}
  .count-bar-fill{height:100%;border-radius:2px;background:var(--accent);}
  .count-num{font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;white-space:nowrap;}

  /* 記錄 */
  .record-list{display:flex;flex-direction:column;gap:10px;}
  .record-card{border:1px solid var(--border);border-radius:8px;padding:12px 14px;background:var(--surface);}
  .record-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
  .record-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
  .record-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px;font-size:12.5px;margin-top:6px;}
  .record-meta-item{display:flex;flex-direction:column;gap:1px;}
  .record-meta-label{font-size:10px;color:var(--text2);font-weight:500;}
  .record-meta-value{font-weight:600;}
  .record-items{margin-top:6px;font-size:12.5px;color:var(--text2);}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;}
  .badge-pending{background:#fef3c7;color:#92400e;} .badge-approved{background:#d1fae5;color:#065f46;}
  .badge-rejected{background:#fee2e2;color:#991b1b;} .badge-returned{background:#e0e7ff;color:#3730a3;}
  .badge-overdue{background:#fee2e2;color:#991b1b;} .badge-damaged{background:#fce7f3;color:#9d174d;}

  /* 圖片燈箱 */
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
  .lightbox.show{display:flex;}
  .lightbox img{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
  .lightbox-info{position:fixed;bottom:24px;left:0;right:0;text-align:center;color:#fff;font-size:14px;font-weight:600;}
  .lightbox-close{position:fixed;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;line-height:1;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);padding:22px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
  .modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
  .toast{position:fixed;bottom:80px;right:20px;background:var(--text);color:#fff;padding:10px 16px;border-radius:8px;font-size:13.5px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.25s;z-index:300;}
  .toast.show{transform:none;opacity:1;} .toast.success{background:var(--accent);} .toast.error{background:var(--danger);}
  .loading{text-align:center;padding:36px;color:var(--text2);font-size:14px;}
  .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:40px 20px;color:var(--text2);}
  .empty-icon{font-size:36px;margin-bottom:8px;}
  .avail-ok{color:var(--accent);} .avail-no{color:var(--danger);}

  @media(max-width:600px){
    .form-grid{grid-template-columns:1fr;}
    header nav button{padding:5px 7px;font-size:12px;}
    header h1{font-size:14px;}
    .equip-browse-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span style="font-size:20px">🧪</span>
    <h1>實驗室器材借用系統</h1>
  </div>
  <nav>
    <button class="active" onclick="showPage('borrow')">申請借用</button>
    <button onclick="showPage('equipment')">器材查詢</button>
    <button onclick="showPage('myrecords')">我的記錄</button>
  </nav>
</header>

<main>

<!-- 申請借用 -->
<div id="page-borrow" class="page active">
  <div class="deposit-banner" id="depositBanner">
    <h3>⚠️ 此借用目的需繳納保證金</h3>
    <ul>
      <li>🏛️ 僅借用場地：NT$500</li>
      <li>🔬 僅借用器材：NT$1,000</li>
      <li>📦 場地＋器材皆借：NT$1,500</li>
      <li>✅ 完整歸還後全額退還；如有損壞，照價賠償</li>
    </ul>
    <div class="deposit-amount" id="depositCalc">NT$ 0</div>
    <div style="font-size:12px;color:#92400e">預估保證金（請於借用前至辦公室繳納）</div>
  </div>

  <div class="card">
    <div class="card-title">👤 借用人資料</div>
    <div class="form-grid">
      <div class="form-group"><label>借用人姓名 *</label><input type="text" id="f-name" placeholder="輸入姓名"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="f-email" placeholder="student@school.edu.tw"></div>
      <div class="form-group">
        <label>借用目的 *</label>
        <select id="f-purpose" onchange="onPurposeChange()">
          <option value="">-- 請選擇 --</option>
          <option value="課程">課程</option>
          <option value="自主學習">自主學習</option>
          <option value="科展">科展</option>
          <option value="社團">社團</option>
          <option value="其他">其他</option>
        </select>
        <div class="hint">自主學習、科展需繳保證金</div>
      </div>
      <div class="form-group">
        <label>是否借用場地</label>
        <select id="f-venue" onchange="calcDeposit()">
          <option value="">否（不借用場地）</option>
          <option value="化學實驗室">是（化學實驗室）</option>
          <option value="理化實驗室">是（理化實驗室）</option>
          <option value="物理實驗室">是（物理實驗室）</option>
          <option value="生物實驗室">是（生物實驗室）</option>
          <option value="地科實驗室">是（地科實驗室）</option>
        </select>
      </div>
      <div class="form-group"><label>借用日期 *</label><input type="date" id="f-borrow-date"></div>
      <div class="form-group"><label>預計歸還日期 *</label><input type="date" id="f-return-date"></div>
      <div class="form-group full"><label>備註說明</label><textarea id="f-note" placeholder="其他說明、特殊需求…"></textarea></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔬 選擇借用器材</div>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input class="search-input" type="text" id="borrowSearch" placeholder="搜尋器材名稱，例如：燒杯…" oninput="doBorrowSearch(this.value)">
    </div>
    <div id="borrowSearchResults"></div>
    <div class="room-tabs" id="roomTabs"><div class="loading"><div class="spinner"></div>載入中…</div></div>
    <div class="equip-list" id="equipList"></div>
  </div>

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px;padding-bottom:80px">
    <button class="btn btn-secondary" onclick="resetForm()">清除重填</button>
    <button class="btn btn-primary" id="submitBtn" onclick="submitRequest()">📋 提交借用申請</button>
  </div>
</div>

<!-- 器材查詢 -->
<div id="page-equipment" class="page">
  <div class="card">
    <div class="card-title">📦 器材庫存查詢</div>
    <div class="browse-filters">
      <input type="text" id="equipSearch" placeholder="搜尋器材名稱…" oninput="filterEquipBrowse()">
      <select id="equipRoomFilter" onchange="filterEquipBrowse()"><option value="">全部房間</option></select>
    </div>
    <div class="equip-browse-grid" id="equipBrowseGrid"><div class="loading"><div class="spinner"></div>載入中…</div></div>
  </div>
</div>

<!-- 我的記錄 -->
<div id="page-myrecords" class="page">
  <div class="card">
    <div class="card-title">📋 我的借用記錄</div>
    <div class="form-grid" style="margin-bottom:14px;">
      <div class="form-group"><label>輸入 Email 查詢</label><input type="email" id="queryEmail" placeholder="your@email.com"></div>
      <div class="form-group" style="justify-content:flex-end;padding-top:18px;"><button class="btn btn-primary" onclick="loadMyRecords()">🔍 查詢</button></div>
    </div>
    <div id="myRecordsList"><div class="empty"><div class="empty-icon">📭</div><p>輸入 Email 後點擊查詢</p></div></div>
  </div>
</div>

</main>

<!-- 購物車 FAB -->
<button class="cart-fab" id="cartFab" onclick="openCart()">
  🛒 已選器材
  <span class="cart-badge" id="cartBadge">0</span>
</button>

<!-- 購物車背景遮罩 -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!-- 購物車抽屜 -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-handle"></div>
  <div class="cart-drawer-header">
    <div class="cart-drawer-title">🛒 已選器材</div>
    <button class="btn btn-secondary btn-sm" onclick="closeCart()">關閉</button>
  </div>
  <div class="cart-drawer-body" id="cartBody">
    <div class="empty"><div class="empty-icon">🛒</div><p>尚未選擇任何器材</p></div>
  </div>

<script>
const SUPABASE_URL = 'https://bgifddtcklpqbmljlvcg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaWZkZHRja2xwcWJtbGpsdmNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5OTU0NzQsImV4cCI6MjA5NjU3MTQ3NH0.fHdIRQU2mD9IwX3XHKize1aewAnc9ZpGF0W7Z0wgx64';

const ROOM_NAMES = {'Chemistry':'化學實驗室','Biology':'生物實驗室','Geoscience':'地球科學實驗室','Physics Chemistry':'理化實驗室','Physics':'物理實驗室','TeachingMaterialRoom':'教具室'};
const rn = r => ROOM_NAMES[r] || r;

async function sb(method, table, opts={}) {
  let url = SUPABASE_URL+'/rest/v1/'+table;
  const p=[];
  if(opts.select) p.push('select='+opts.select);
  if(opts.filter) p.push(opts.filter);
  if(opts.order) p.push('order='+opts.order);
  if(p.length) url+='?'+p.join('&');
  const res = await fetch(url,{method,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation'},body:opts.body?JSON.stringify(opts.body):undefined});
  if(res.status===204) return [];
  const data=await res.json();
  if(!res.ok) throw new Error(data.message||res.statusText);
  return data;
}

let allEquipment=[], selectedItems={}, allRooms=[], currentRoom='';

window.addEventListener('DOMContentLoaded',()=>{
  setMinDates(); loadEquipment(); loadEquipBrowse();
});

function setMinDates(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('f-borrow-date').min=today;
  document.getElementById('f-return-date').min=today;
  document.getElementById('f-borrow-date').value=today;
  document.getElementById('f-borrow-date').addEventListener('change',e=>{document.getElementById('f-return-date').min=e.target.value;});
}

// 燈箱
function openLightbox(url, name) {
  event && event.stopPropagation();
  document.getElementById('lightboxImg').src=url;
  document.getElementById('lightboxInfo').textContent=name||'';
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('show'); }

// 購物車
function openCart(){ document.getElementById('cartDrawer').classList.add('open'); document.getElementById('cartOverlay').classList.add('show'); renderCart(); }
function closeCart(){ document.getElementById('cartDrawer').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('show'); }
function clearCart(){ selectedItems={}; updateCartBadge(); renderEquipList(); renderCart(); calcDeposit(); }

function updateCartBadge(){
  const items=Object.values(selectedItems);
  const total=items.reduce((s,i)=>s+i.quantity,0);
  document.getElementById('cartBadge').textContent=total;
  document.getElementById('cartFab').classList.toggle('show', total>0);
}

function renderCart(){
  const body=document.getElementById('cartBody');
  const items=Object.values(selectedItems);
  if(!items.length){ body.innerHTML='<div class="empty"><div class="empty-icon">🛒</div><p>尚未選擇任何器材</p></div>'; return; }
  body.innerHTML=items.map(i=>{
    const equip=allEquipment.find(e=>e.room===i.room&&e.name===i.name);
    const imgHtml=equip?.image_url?`<img class="cart-item-thumb" src="${equip.image_url}" loading="lazy" onerror="this.style.display='none'">`:`<div class="cart-item-thumb-ph">🔬</div>`;
    return `<div class="cart-item">
      ${imgHtml}
      <div style="flex:1;min-width:0">
        <div class="cart-item-name">${i.name}</div>
        <div class="cart-item-sub">${rn(i.room)} ${i.spec?'・'+i.spec:''}</div>
      </div>
      <div class="cart-item-qty">× ${i.quantity} ${i.unit}</div>
      <button class="cart-item-remove" onclick="removeItem('${i.room}__${i.name.replace(/'/g,"\\'")}')">✕</button>
    </div>`;
  }).join('');
}

// 搜尋
let searchTimer=null;
function doBorrowSearch(q){
  const box=document.getElementById('borrowSearchResults');
  clearTimeout(searchTimer);
  if(!q.trim()){box.innerHTML='';return;}
  searchTimer=setTimeout(async()=>{
    box.innerHTML='<div class="loading"><div class="spinner"></div>搜尋中…</div>';
    try{
      const rows=await sb('GET','equipment',{filter:'name=ilike.*'+encodeURIComponent(q)+'*',order:'room,name'});
      if(!rows.length){box.innerHTML='<div class="search-empty">找不到「'+q+'」相關器材</div>';return;}
      box.innerHTML='<div class="search-dropdown">'+rows.map(e=>{
        const avail=parseInt(e.available)||0;
        const imgHtml=e.image_url?`<img class="sr-thumb" src="${e.image_url}" loading="lazy" onclick="openLightbox('${e.image_url}','${e.name}')" onerror="this.style.display='none'">`:`<div class="sr-thumb-ph">🔬</div>`;
        return `<div class="search-result-item" onclick="jumpToEquip('${e.room}','${e.name.replace(/'/g,"\\'")}')">
          ${imgHtml}
          <div style="flex:1;min-width:0">
            <div class="sr-name">${e.name}</div>
            <div class="sr-room">${rn(e.room)}</div>
            ${e.spec?`<div class="sr-spec">${e.spec}</div>`:''}
          </div>
          <div class="sr-avail ${avail>0?'avail-ok':'avail-no'}">${avail>0?'可借 '+avail+' '+e.unit:'無庫存'}</div>
        </div>`;
      }).join('')+'</div>';
    }catch(err){box.innerHTML='<div class="search-empty">搜尋失敗</div>';}
  },350);
}

function jumpToEquip(room, name){
  document.getElementById('borrowSearch').value='';
  document.getElementById('borrowSearchResults').innerHTML='';
  currentRoom=room; renderRoomTabs(); renderEquipList();
  setTimeout(()=>{
    const key=room+'__'+name;
    if(!selectedItems[key]){
      const equip=allEquipment.find(e=>e.room===room&&e.name===name);
      if(equip&&parseInt(equip.available)>0){
        selectedItems[key]={room,name,spec:equip.spec,unit:equip.unit,quantity:1};
        renderEquipList(); updateCartBadge(); calcDeposit();
        showToast(name+' 已加入選擇','success');
      }
    }
  },200);
}

async function loadEquipment(){
  try{
    const rows=await sb('GET','equipment',{order:'room,name'});
    allEquipment=rows.map(r=>({id:r.id,room:r.room,name:r.name,spec:r.spec||'',total:r.total,available:r.available,unit:r.unit||'個',image_url:r.image_url||'',location:r.location||''}));
    allRooms=[...new Set(rows.map(r=>r.room))];
    renderRoomTabs();
    if(allRooms.length>0){currentRoom=allRooms[0];renderEquipList();}
  }catch(e){document.getElementById('roomTabs').innerHTML='<p style="color:var(--danger)">載入失敗</p>';}
}

function renderRoomTabs(){
  document.getElementById('roomTabs').innerHTML=allRooms.map(r=>
    `<button class="room-tab ${r===currentRoom?'active':''}" onclick="selectRoom('${r}')">${rn(r)}</button>`
  ).join('');
}

function selectRoom(room){currentRoom=room;renderRoomTabs();renderEquipList();}

function renderEquipList(){
  const list=document.getElementById('equipList');
  const items=allEquipment.filter(e=>e.room===currentRoom);
  if(!items.length){list.innerHTML='<div class="empty"><div class="empty-icon">📦</div><p>此房間目前無器材</p></div>';return;}
  list.innerHTML=items.map(e=>{
    const avail=parseInt(e.available)||0;
    const qty=selectedItems[e.room+'__'+e.name]?.quantity||0;
    const safeN=e.name.replace(/'/g,"\\'"), safeS=(e.spec||'').replace(/'/g,"\\'");
    const imgHtml=e.image_url
      ?`<img class="equip-thumb" src="${e.image_url}" loading="lazy" onclick="event.stopPropagation();openLightbox('${e.image_url}','${safeN}')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="equip-thumb-ph" style="display:none">🔬</div>`
      :`<div class="equip-thumb-ph">🔬</div>`;
    return `<div class="equip-row ${avail<=0?'unavailable':''}">
      ${imgHtml}
      <div class="equip-row-info">
        <div class="equip-row-name">${e.name}</div>
        <div class="equip-row-sub">${e.spec||''}${e.location?' ・ '+e.location:''}</div>
        <div class="equip-row-avail ${avail>0?'avail-ok':'avail-no'}">${avail>0?'可借：'+avail+' '+e.unit:'目前無庫存'}</div>
      </div>
      ${avail>0?`<div class="equip-row-qty" onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty('${e.room}','${safeN}','${safeS}','${e.unit}',${avail},-1)">−</button>
        <input class="qty-input" type="number" min="0" max="${avail}" value="${qty}"
          onchange="setQty('${e.room}','${safeN}','${safeS}','${e.unit}',${avail},this.value)"
          onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty('${e.room}','${safeN}','${safeS}','${e.unit}',${avail},1)">+</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function changeQty(room,name,spec,unit,avail,delta){
  const key=room+'__'+name, cur=selectedItems[key]?.quantity||0, next=Math.max(0,Math.min(avail,cur+delta));
  if(next===0) delete selectedItems[key]; else selectedItems[key]={room,name,spec,unit,quantity:next};
  renderEquipList(); updateCartBadge(); calcDeposit();
}
function setQty(room,name,spec,unit,avail,val){
  const qty=Math.max(0,Math.min(avail,parseInt(val)||0)), key=room+'__'+name;
  if(qty===0) delete selectedItems[key]; else selectedItems[key]={room,name,spec,unit,quantity:qty};
  renderEquipList(); updateCartBadge(); calcDeposit();
}
function removeItem(key){
  delete selectedItems[key]; renderEquipList(); updateCartBadge(); renderCart(); calcDeposit();
}

// 保證金
function onPurposeChange(){
  const p=document.getElementById('f-purpose').value;
  document.getElementById('depositBanner').classList.toggle('show',p!==''&&p!=='課程');
  calcDeposit();
}
function calcDeposit(){
  const p=document.getElementById('f-purpose').value, hv=!!document.getElementById('f-venue').value, he=Object.keys(selectedItems).length>0;
  let amount=0;
  if(p!==''&&p!=='課程'){if(hv&&he)amount=1500;else if(hv)amount=500;else if(he)amount=1000;}
  document.getElementById('depositCalc').textContent='NT$ '+amount.toLocaleString();
}

// 提交
async function submitRequest(){
  const name=document.getElementById('f-name').value.trim(), email=document.getElementById('f-email').value.trim(),
    purpose=document.getElementById('f-purpose').value, borrowDate=document.getElementById('f-borrow-date').value,
    returnDate=document.getElementById('f-return-date').value, venue=document.getElementById('f-venue').value,
    note=document.getElementById('f-note').value.trim(), items=Object.values(selectedItems);
  if(!name||!email||!purpose||!borrowDate||!returnDate){showToast('請填寫所有必填欄位','error');return;}
  if(!email.includes('@')){showToast('請輸入正確的 Email','error');return;}
  if(returnDate<borrowDate){showToast('歸還日期不能早於借用日期','error');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='提交中…';
  try{
    const id='REQ-'+Date.now();
    let dt='無',da=0;
    if(purpose!=='課程'){
      const hv=!!venue,he=items.length>0;
      if(hv&&he){dt='場地+器材';da=1500;}else if(hv){dt='場地';da=500;}else if(he){dt='器材';da=1000;}
    }
    await sb('POST','borrow_records',{body:{id,borrower_name:name,email,purpose,items,borrow_date:borrowDate,return_date:returnDate,status:'待審核',deposit_type:dt,deposit_amount:da,deposit_status:da>0?'待繳納':'不需要',note}});
    for(const item of items){
      const equip=allEquipment.find(e=>e.room===item.room&&e.name===item.name);
      if(equip){await sb('PATCH','equipment',{filter:'id=eq.'+equip.id,body:{available:Math.max(0,equip.available-parseInt(item.quantity))},prefer:'return=minimal'});equip.available=Math.max(0,equip.available-parseInt(item.quantity));}
    }
    showModal('✅ 申請成功',`<p>申請編號：<strong style="font-family:'DM Mono',monospace">${id}</strong></p><p style="margin-top:8px;font-size:13px;color:var(--text2)">請等待管理員審核。${da>0?'<br>保證金：NT$'+da+'（'+dt+'），請至辦公室繳納。':''}</p>`,[{label:'確定',cls:'btn-primary',fn:'closeModal()'}]);
    resetForm();
  }catch(e){showToast('提交失敗：'+e.message,'error');}
  btn.disabled=false; btn.textContent='📋 提交借用申請';
}

function resetForm(){
  ['f-name','f-email','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-purpose').value=''; document.getElementById('f-venue').value='';
  document.getElementById('depositBanner').classList.remove('show');
  selectedItems={}; renderEquipList(); updateCartBadge(); setMinDates();
}

// 我的記錄
async function loadMyRecords(){
  const email=document.getElementById('queryEmail').value.trim();
  if(!email){showToast('請輸入 Email','error');return;}
  const list=document.getElementById('myRecordsList');
  list.innerHTML='<div class="loading"><div class="spinner"></div>查詢中…</div>';
  try{
    const rows=await sb('GET','borrow_records',{filter:'email=eq.'+encodeURIComponent(email),order:'created_at.desc'});
    renderRecordList(mapRecords(rows),list);
  }catch(e){list.innerHTML='<div class="empty"><div class="empty-icon">❌</div><p>查詢失敗</p></div>';}
}

// 器材瀏覽
let allEquipBrowse=[];
async function loadEquipBrowse(){
  try{
    const rows=await sb('GET','equipment',{order:'room,name'});
    allEquipBrowse=rows.map(r=>({room:r.room,name:r.name,spec:r.spec||'',total:r.total,available:r.available,unit:r.unit||'個',image_url:r.image_url||'',location:r.location||''}));
    const rf=document.getElementById('equipRoomFilter');
    [...new Set(rows.map(r=>r.room))].forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=rn(r);rf.appendChild(o);});
    renderEquipBrowse(allEquipBrowse);
  }catch(e){}
}
function filterEquipBrowse(){
  const q=document.getElementById('equipSearch').value.toLowerCase(), room=document.getElementById('equipRoomFilter').value;
  renderEquipBrowse(allEquipBrowse.filter(e=>(!room||e.room===room)&&(!q||e.name.toLowerCase().includes(q)||e.spec.toLowerCase().includes(q))));
}
function renderEquipBrowse(items){
  const grid=document.getElementById('equipBrowseGrid');
  if(!items.length){grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>找不到符合的器材</p></div>';return;}
  grid.innerHTML=items.map(e=>{
    const avail=parseInt(e.available)||0, total=parseInt(e.total)||1, pct=Math.round(avail/total*100);
    const safeN=e.name.replace(/'/g,"\\'");
    const imgHtml=e.image_url
      ?`<img class="equip-browse-img" src="${e.image_url}" loading="lazy" onclick="openLightbox('${e.image_url}','${safeN}')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="equip-browse-img-ph" style="display:none">🔬</div>`
      :`<div class="equip-browse-img-ph">🔬</div>`;
    return `<div class="equip-browse-card" onclick="openLightbox('${e.image_url||''}','${safeN}')">
      ${imgHtml}
      <div class="equip-browse-body">
        <div class="equip-browse-room">${rn(e.room)}</div>
        <div class="equip-browse-name">${e.name}</div>
        <div class="equip-browse-spec">${e.spec||'─'}${e.location?' ・ '+e.location:''}</div>
        <div class="equip-browse-count">
          <span class="count-num ${avail>0?'avail-ok':'avail-no'}">${avail}</span>
          <div class="count-bar-bg"><div class="count-bar-fill" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:var(--text2)">/ ${total} ${e.unit}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function mapRecords(rows){
  return rows.map(r=>({id:r.id,time:r.created_at,name:r.borrower_name,email:r.email,purpose:r.purpose,items:r.items||[],borrowDate:r.borrow_date,returnDate:r.return_date,actualReturn:r.actual_return,status:r.status,depositType:r.deposit_type,depositAmount:r.deposit_amount,depositStatus:r.deposit_status,note:r.note}));
}
function renderRecordList(records,container){
  if(!records||!records.length){container.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>目前沒有記錄</p></div>';return;}
  container.innerHTML='<div class="record-list">'+records.map(r=>{
    const sc={'待審核':'badge-pending','已核准':'badge-approved','已拒絕':'badge-rejected','已歸還':'badge-returned','逾期':'badge-overdue','已歸還-損壞':'badge-damaged'}[r.status]||'badge-pending';
    const items=Array.isArray(r.items)?r.items:[];
    const itemStr=items.map(i=>rn(i.room)+' '+i.name+' × '+i.quantity+(i.unit||'')).join('、')||'─';
    return `<div class="record-card">
      <div class="record-header">
        <div><span class="record-id">${r.id}</span>
          <div style="font-size:14px;font-weight:700;margin-top:3px">${r.name}</div>
          <div style="font-size:12px;color:var(--text2)">${r.email}</div></div>
        <span class="badge ${sc}">${r.status}</span>
      </div>
      <div class="record-meta">
        <div class="record-meta-item"><span class="record-meta-label">借用目的</span><span class="record-meta-value">${r.purpose}</span></div>
        <div class="record-meta-item"><span class="record-meta-label">借用日期</span><span class="record-meta-value">${r.borrowDate||'─'}</span></div>
        <div class="record-meta-item"><span class="record-meta-label">預計歸還</span><span class="record-meta-value">${r.returnDate||'─'}</span></div>
        ${r.depositAmount>0?`<div class="record-meta-item"><span class="record-meta-label">保證金</span><span class="record-meta-value">NT$${r.depositAmount} (${r.depositStatus})</span></div>`:''}
      </div>
      <div class="record-items">🔬 ${itemStr}</div>
      ${r.note?`<div style="font-size:11.5px;color:var(--text2);margin-top:4px">📝 ${r.note}</div>`:''}
    </div>`;
  }).join('')+'</div>';
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('header nav button').forEach((b,i)=>b.classList.toggle('active',['borrow','equipment','myrecords'][i]===page));
}
function showModal(title,body,actions){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalActions').innerHTML=actions.map(a=>`<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(event){if(!event||event.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('show');}
let toastTimer;
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
